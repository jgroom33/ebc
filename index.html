<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciena EBC — Conference Room</title>
  <link rel="icon" href="data:," />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0b0f14; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    /* Title / branding overlay */
    #hud {
      position: fixed; top: 22px; left: 26px; z-index: 10;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      color: #eaf1f8; pointer-events: none; user-select: none;
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    }
    #hud .logo { font-size: 30px; font-weight: 700; letter-spacing: 4px; color: #e4002b; }
    #hud .sub  { font-size: 13px; font-weight: 400; letter-spacing: 2px; opacity: 0.85; margin-top: 2px; }
    #hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 10;
      font-family: "Segoe UI", system-ui, sans-serif; font-size: 12px; letter-spacing: 1px;
      color: #cdd8e3; opacity: 0.7; pointer-events: none; user-select: none;
    }

    /* Loading screen */
    #loader {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center; flex-direction: column;
      background: #0b0f14; transition: opacity 0.6s ease; gap: 14px;
      font-family: "Segoe UI", system-ui, sans-serif; color: #6f86a0;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader .spin {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(47,143,230,0.25); border-top-color: #2f8fe6;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error panel */
    #error {
      position: fixed; inset: 0; z-index: 30; display: none;
      align-items: center; justify-content: center; padding: 40px;
      background: #0b0f14; font-family: ui-monospace, "Cascadia Code", monospace;
      color: #ff8e8e; font-size: 13px; white-space: pre-wrap; line-height: 1.6;
    }

    /* iPad control overlay — appears when the on-table tablet is tapped. */
    #ipad-overlay {
      position: fixed; inset: 0; z-index: 40; display: none;
      align-items: center; justify-content: center;
      background: rgba(6, 9, 13, 0.55); backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    }
    #ipad-overlay.open { display: flex; }
    /* The tablet "device" — a rounded slab with a thick bezel around the screen. */
    #ipad-overlay .device {
      width: min(86vw, 940px); max-height: 92vh;
      background: linear-gradient(160deg, #1c1f24, #0e1014);
      border-radius: 38px; padding: 20px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.04);
      transform: scale(0.86); opacity: 0;
      transition: transform 0.32s cubic-bezier(.2,.9,.3,1.2), opacity 0.28s ease;
    }
    #ipad-overlay.open .device { transform: scale(1); opacity: 1; }
    /* The glass screen inside the bezel. */
    #ipad-overlay .screen {
      background: radial-gradient(120% 140% at 50% 0%, #142031 0%, #0b1118 60%, #080c11 100%);
      border-radius: 22px; padding: 30px 34px 34px;
      box-shadow: inset 0 0 0 1px rgba(120,170,230,0.10), inset 0 18px 60px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    #ipad-overlay .screen::before {  /* faint screen sheen */
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(125deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 32%);
    }
    #ipad-overlay .head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    #ipad-overlay .titles .logo {
      font-size: 24px; font-weight: 700; letter-spacing: 4px; color: #e4002b;
    }
    #ipad-overlay .titles .sub {
      font-size: 12px; letter-spacing: 2px; color: #9fb3c6; margin-top: 2px;
    }
    #ipad-overlay .close {
      width: 38px; height: 38px; border-radius: 50%; flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04);
      color: #cdd8e3; font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    #ipad-overlay .close:hover { background: rgba(255,255,255,0.10); transform: scale(1.05); }
    /* 2×2 hero menu. */
    #ipad-overlay .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    #ipad-overlay .tile {
      position: relative; text-align: left; cursor: pointer;
      border-radius: 18px; padding: 22px 22px 20px;
      background: linear-gradient(160deg, rgba(38,52,72,0.55), rgba(20,28,40,0.55));
      border: 1px solid rgba(120,170,230,0.14); color: #eaf1f8;
      transition: transform 0.14s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      min-height: 124px; display: flex; flex-direction: column; justify-content: space-between;
    }
    #ipad-overlay .tile:hover {
      transform: translateY(-2px);
      border-color: rgba(120,170,230,0.4);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    #ipad-overlay .tile:active { transform: translateY(0); }
    #ipad-overlay .tile .icon { font-size: 26px; line-height: 1; }
    #ipad-overlay .tile .label { font-size: 18px; font-weight: 600; }
    #ipad-overlay .tile .desc { font-size: 12px; color: #9fb3c6; margin-top: 4px; }
    /* Active state pill (top-right of a tile). */
    #ipad-overlay .tile .state {
      position: absolute; top: 14px; right: 14px;
      font-size: 10px; letter-spacing: 1.5px; font-weight: 700;
      padding: 4px 9px; border-radius: 20px; text-transform: uppercase;
      color: #9fb3c6; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #ipad-overlay .tile.active {
      border-color: rgba(228,0,43,0.55);
      background: linear-gradient(160deg, rgba(96,30,42,0.55), rgba(40,18,24,0.6));
      box-shadow: 0 0 0 1px rgba(228,0,43,0.3), 0 12px 30px rgba(0,0,0,0.4);
    }
    #ipad-overlay .tile.active .state {
      color: #fff; background: #e4002b; border-color: #e4002b;
    }
  </style>

  <!-- three.js + addons from CDN (no build step) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="logo">CIENA</div>
    <div class="sub">EXECUTIVE BRIEFING CENTER</div>
  </div>
  <div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div>

  <div id="loader"><div class="spin"></div><div>Building conference room…</div></div>
  <div id="error"></div>

  <!-- iPad control surface — shown when the on-table tablet is clicked. -->
  <div id="ipad-overlay" aria-hidden="true">
    <div class="device" role="dialog" aria-label="Conference room control">
      <div class="screen">
        <div class="head">
          <div class="titles">
            <div class="logo">CIENA</div>
            <div class="sub">CONFERENCE ROOM CONTROL</div>
          </div>
          <button class="close" data-action="close" title="Close" aria-label="Close">×</button>
        </div>
        <div class="grid">
          <button class="tile" data-action="conf-glass">
            <span class="state">Clear</span>
            <span class="icon">🪟</span>
            <span>
              <span class="label">Conference Room Glass</span>
              <span class="desc">Frost the room's glass wall opaque</span>
            </span>
          </button>
          <button class="tile" data-action="lab-glass">
            <span class="state">Clear</span>
            <span class="icon">🧪</span>
            <span>
              <span class="label">Lab Glass</span>
              <span class="desc">Frost the lab glass across the hall</span>
            </span>
          </button>
          <button class="tile" data-action="ciena-story">
            <span class="state">Off</span>
            <span class="icon">▶</span>
            <span>
              <span class="label">Ciena Story</span>
              <span class="desc">Play the Ciena story on the monitor</span>
            </span>
          </button>
          <button class="tile" data-action="optical-story">
            <span class="state">Off</span>
            <span class="icon">✦</span>
            <span>
              <span class="label">Optical Story</span>
              <span class="desc">Play the optical story on the monitor</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Surface any module-load/runtime error to the on-screen panel. -->
  <script>
    (function () {
      const errEl = document.getElementById('error');
      function showError(msg) {
        errEl.style.display = 'flex';
        errEl.textContent = 'Failed to load the scene:\n\n' + msg;
        const l = document.getElementById('loader');
        if (l) l.classList.add('hidden');
      }
      window.addEventListener('error', (e) => showError(e.message || String(e.error)));
      window.addEventListener('unhandledrejection', (e) => showError(String(e.reason)));
    })();
  </script>

  <!-- ======================================================================
       Ciena EBC — Glass-Walled Conference Room (inlined; single-file build)
       A parametric three.js scene. Every element is its own THREE.Group,
       driven by the CONFIG block below so the room can be re-proportioned in
       one place. three.js loads from a CDN via the import map above.
       ====================================================================== -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';

    // -----------------------------------------------------------------------
    // Units & configuration  (internal units = metres; defaults given in feet)
    // -----------------------------------------------------------------------
    const FT = 0.3048;          // feet  -> metres
    const IN = FT / 12;         // inches -> metres

    const CONFIG = {
      // Architectural shell -------------------------------------------------
      roomLength:     48 * FT,  // X — the long (glass) wall's length
      roomDepth:      16 * FT,  // Z — how deep the room is
      ceilingHeight:   9 * FT,  // Y
      hallWidth:       6 * FT,  // Z — hallway between the two glass walls
      wallThickness:   6 * IN,
      glassThickness:  1 * IN,
      frameDepth:      2 * IN,  // mullion / frame profile
      // Door opening in the near glass wall --------------------------------
      doorWidth:       3.2 * FT,
      doorHeight:      7 * FT,
      // Furniture -----------------------------------------------------------
      tableLength:    32 * FT,
      tableWidth:      4 * FT,
      tableHeight:     0.74,     // ~29 in
      chairsPerSide:   9,
      // Ceiling lights ------------------------------------------------------
      lightCols:       8,        // along X
      lightRows:       2,        // along Z
      // Palette -------------------------------------------------------------
      cienaRed: '#e4002b',       // logo wordmark colour
      color: {
        brandBlue:  0x0056b4,
        wall:       0xe1ded7,
        floorRoom:  0x3c3f46,    // carpet
        floorHall:  0x9aa3ab,    // polished
        ceiling:    0xededed,
        frame:      0x2a2e33,    // dark anodised metal
        glassTint:  0xcfe3ea,
        tableTop:   0x2a1c12,    // dark wood
        tableBase:  0x1e1e21,
        chair:      0x2d3037,
        screen:     0x0f0f12,
        lens:       0xfff6e6,
      },
    };

    // Convenience derived dimensions
    const L = CONFIG.roomLength;
    const D = CONFIG.roomDepth;
    const H = CONFIG.ceilingHeight;
    const W = CONFIG.hallWidth;

    // -----------------------------------------------------------------------
    // Renderer / scene / camera
    // -----------------------------------------------------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('app').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x10151b);

    // Image-based lighting — required for transmissive glass to read believably.
    RectAreaLightUniformsLib.init();
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const camera = new THREE.PerspectiveCamera(
      52, window.innerWidth / window.innerHeight, 0.1, 200
    );
    camera.position.set(L * 0.40, 1.75, D * 0.92);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.target.set(-L * 0.04, 1.35, -W * 0.4); // look across the room & through the glass
    controls.minDistance = 1.5;
    controls.maxDistance = 70;
    controls.maxPolarAngle = Math.PI * 0.495;       // don't dip under the floor
    controls.update();

    // -----------------------------------------------------------------------
    // Materials
    // -----------------------------------------------------------------------
    const C = CONFIG.color;
    const mat = {
      wall:      new THREE.MeshStandardMaterial({ color: C.wall, roughness: 0.92, metalness: 0.0 }),
      floorRoom: new THREE.MeshStandardMaterial({ color: C.floorRoom, roughness: 0.95, metalness: 0.0 }),
      floorHall: new THREE.MeshStandardMaterial({ color: C.floorHall, roughness: 0.25, metalness: 0.1 }),
      ceiling:   new THREE.MeshStandardMaterial({ color: C.ceiling, roughness: 0.96, metalness: 0.0 }),
      frame:     new THREE.MeshStandardMaterial({ color: C.frame, roughness: 0.4, metalness: 0.85 }),
      tableTop:  new THREE.MeshStandardMaterial({ color: C.tableTop, roughness: 0.45, metalness: 0.05 }),
      tableBase: new THREE.MeshStandardMaterial({ color: C.tableBase, roughness: 0.5, metalness: 0.7 }),
      chair:     new THREE.MeshStandardMaterial({ color: C.chair, roughness: 0.7, metalness: 0.2 }),
      screen:    new THREE.MeshStandardMaterial({ color: C.screen, roughness: 0.25, metalness: 0.3,
                                                  emissive: 0x0a1a2e, emissiveIntensity: 0.6 }),
      brand:     new THREE.MeshStandardMaterial({ color: C.brandBlue, roughness: 0.5, metalness: 0.1,
                                                  emissive: C.brandBlue, emissiveIntensity: 0.15 }),
      lens:      new THREE.MeshStandardMaterial({ color: C.lens, emissive: C.lens, emissiveIntensity: 1.4,
                                                  roughness: 0.6 }),
      // Transmissive architectural glass. A low `thickness` keeps it reading as a thin
      // pane: high thickness makes the panes lens the room into a flipped ("mirror")
      // image, which looked like the door had a duplicate of itself.
      glass: new THREE.MeshPhysicalMaterial({
        color: C.glassTint, metalness: 0, roughness: 0.04,
        transmission: 1.0, ior: 1.5, thickness: 0.05,
        transparent: true, opacity: 1.0,
        envMapIntensity: 0.9, clearcoat: 0.12, clearcoatRoughness: 0.1,
      }),
    };

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    // A box centred at the origin of its own local space; caller positions it.
    function box(w, h, d, material, { cast = true, receive = true } = {}) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
      m.castShadow = cast;
      m.receiveShadow = receive;
      return m;
    }

    // Place a mesh by the centre of its footprint.
    function at(mesh, x, y, z) { mesh.position.set(x, y, z); return mesh; }

    const root = new THREE.Group();
    root.name = 'CienaEBC';
    scene.add(root);

    // -----------------------------------------------------------------------
    // Architectural shell
    // -----------------------------------------------------------------------
    function buildFloors() {
      const g = new THREE.Group(); g.name = 'Floors';
      const t = 2 * IN;
      // Room floor: Z in [0, D]
      g.add(at(box(L + 0.4, t, D, mat.floorRoom, { cast: false }), 0, -t / 2, D / 2));
      // Hallway floor: Z in [-W, 0]
      g.add(at(box(L + 0.4, t, W, mat.floorHall, { cast: false }), 0, -t / 2, -W / 2));
      root.add(g);
      return g;
    }

    function buildCeilings() {
      const g = new THREE.Group(); g.name = 'Ceilings';
      const t = 4 * IN;
      g.add(at(box(L + 0.4, t, D, mat.ceiling, { cast: false }), 0, H + t / 2, D / 2));
      g.add(at(box(L + 0.4, t, W, mat.ceiling, { cast: false }), 0, H + t / 2, -W / 2));
      root.add(g);
      return g;
    }

    // (The opaque side & rear walls were intentionally removed so the room can be
    //  panned/orbited from any angle without an enclosing wall blocking the view.
    //  The display + branding now live on a freestanding media wall.)

    // A horizontal frame rail spanning the full wall length.
    function rail(y, z, height = CONFIG.frameDepth) {
      return at(box(L, height, CONFIG.frameDepth, mat.frame), 0, y, z);
    }
    // A vertical mullion.
    function mullion(x, z, h = H) {
      return at(box(CONFIG.frameDepth, h, CONFIG.frameDepth, mat.frame), x, h / 2, z);
    }

    // Near glass wall (Z = 0) with a door at each far end; far wall (Z = -W) solid.
    function buildGlassWall(z, { door = false, name = 'GlassWall' } = {}) {
      const g = new THREE.Group(); g.name = name;
      const gt = CONFIG.glassThickness;

      // Each wall gets its OWN glass material clone so it can be frosted opaque
      // independently of the other. Remember the clear-glass values for toggling back.
      const glass = mat.glass.clone();
      glass.userData.clear = {
        color: glass.color.getHex(),
        transmission: glass.transmission,
        roughness: glass.roughness,
        opacity: glass.opacity,
      };
      g.userData.glassMat = glass;

      // Top & bottom rails + the two end mullions.
      g.add(rail(CONFIG.frameDepth / 2, z));                 // sill
      g.add(rail(H - CONFIG.frameDepth / 2, z));             // head
      g.add(mullion(-L / 2 + CONFIG.frameDepth / 2, z));
      g.add(mullion( L / 2 - CONFIG.frameDepth / 2, z));

      const glassH = H - CONFIG.frameDepth;                  // between sill & head
      const glassY = CONFIG.frameDepth + glassH / 2;

      if (!door) {
        // Single continuous glazed wall, split by a few mullions for realism.
        const bays = 4;
        const bayW = L / bays;
        for (let i = 0; i < bays; i++) {
          const cx = -L / 2 + bayW * (i + 0.5);
          g.add(at(box(bayW - CONFIG.frameDepth, glassH, gt, glass, { cast: false }), cx, glassY, z));
          if (i > 0) g.add(mullion(-L / 2 + bayW * i, z));
        }
      } else {
        // Glazed wall with a door tucked against each far end and a continuous
        // glazed span filling the middle: door | glass…glass | door.
        const dw = CONFIG.doorWidth;
        const dh = CONFIG.doorHeight;
        const fd = CONFIG.frameDepth;
        const xL = -L / 2 + fd + dw / 2;                     // left door centre
        const xR =  L / 2 - fd - dw / 2;                     // right door centre

        // One door at centre cx; its inner edge gets a mullion, the outer edge
        // shares the wall's end mullion. `handleSide` faces the handle inward.
        function addDoor(cx, handleSide) {
          g.add(mullion(cx + handleSide * dw / 2, z));       // inner mullion
          const transH = (H - fd) - dh;                      // transom above the door
          if (transH > 0.02) {
            g.add(at(box(dw, transH, gt, glass, { cast: false }),
                     cx, dh + transH / 2 + fd / 2, z));
            g.add(at(box(dw, fd, fd, mat.frame), cx, dh + fd / 2, z));   // head rail
          }
          // Door leaf (inset glass pane) + a pull handle on the inner edge.
          g.add(at(box(dw - 1.5 * IN, dh - 2 * IN, gt, glass, { cast: false }),
                   cx, dh / 2 + fd / 2, z));
          g.add(at(box(1.2 * IN, 12 * IN, 1.2 * IN, mat.frame),
                   cx + handleSide * (dw / 2 - 4 * IN), 1.05, z + gt));
        }
        addDoor(xL,  1);                                     // left door, handle toward centre
        addDoor(xR, -1);                                     // right door, handle toward centre

        // Continuous glazed span between the two doors, split by a few mullions.
        const midL = xL + dw / 2, midR = xR - dw / 2;
        const midW = midR - midL;
        const bays = Math.max(1, Math.round(midW / (8 * FT)));
        const bayW = midW / bays;
        for (let i = 0; i < bays; i++) {
          const cx = midL + bayW * (i + 0.5);
          g.add(at(box(bayW - fd, glassH, gt, glass, { cast: false }), cx, glassY, z));
          if (i > 0) g.add(mullion(midL + bayW * i, z));
        }
      }

      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Furniture
    // -----------------------------------------------------------------------
    function buildTable() {
      const g = new THREE.Group(); g.name = 'Table';
      const cz = D / 2;
      const topT = 2 * IN;
      const topY = CONFIG.tableHeight - topT / 2;
      // Top slab (slightly rounded look via a thin bevel box stack)
      g.add(at(box(CONFIG.tableLength, topT, CONFIG.tableWidth, mat.tableTop), 0, topY, cz));
      g.add(at(box(CONFIG.tableLength - 1 * IN, 0.6 * IN, CONFIG.tableWidth - 1 * IN, mat.tableTop),
               0, topY - topT / 2 - 0.3 * IN, cz));
      // Two panel bases (modern conference-table style)
      const baseH = CONFIG.tableHeight - topT;
      const baseInset = CONFIG.tableLength * 0.28;
      for (const sx of [-baseInset, baseInset]) {
        g.add(at(box(2 * IN, baseH, CONFIG.tableWidth * 0.55, mat.tableBase), sx, baseH / 2, cz));
        g.add(at(box(10 * IN, 1 * IN, CONFIG.tableWidth * 0.62, mat.tableBase), sx, 0.5 * IN, cz)); // foot
      }
      // A subtle brand-blue cable channel down the centre of the top
      g.add(at(box(CONFIG.tableLength * 0.5, 0.4 * IN, 3 * IN, mat.brand), 0, topY + topT / 2, cz));
      root.add(g);
      return g;
    }

    // A solid cylinder helper (used for clean chair bases — no thin flickering plates).
    function cyl(rTop, rBottom, h, material) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBottom, h, 24), material);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }

    // One chair as a reusable group; cloned for each seat.
    function makeChair() {
      const g = new THREE.Group(); g.name = 'Chair';
      const seatH = 0.46, seatW = 0.5, seatD = 0.5;
      // Thick seat cushion + backrest (solid forms, not thin plates). The backrest is
      // pulled forward so its back face does NOT share the seat's back plane (z = -seatD/2),
      // which would otherwise z-fight and flicker as a "growing cube" when orbiting.
      g.add(at(box(seatW, 0.12, seatD, mat.chair), 0, seatH, 0));
      g.add(at(box(seatW, 0.52, 0.08, mat.chair), 0, seatH + 0.30, -seatD / 2 + 0.09));
      // Pedestal: gas column + disc base (cylinders — orbit-stable, no size flicker).
      // The column runs UP INTO the seat (top above seatH) so its cap never lies exactly
      // on the seat's underside plane — another coincident-face source of flicker.
      g.add(at(cyl(0.03, 0.03, seatH + 0.04, mat.tableBase), 0, (seatH + 0.04) / 2, 0));
      g.add(at(cyl(0.27, 0.30, 0.05, mat.tableBase), 0, 0.026, 0));
      return g;
    }

    function placeChairs() {
      const g = new THREE.Group(); g.name = 'Chairs';
      const proto = makeChair();
      const cz = D / 2;
      const n = CONFIG.chairsPerSide;
      const span = CONFIG.tableLength * 0.92;
      const gap = CONFIG.tableWidth / 2 + 0.32;             // distance from table centre to chair
      for (let i = 0; i < n; i++) {
        const x = -span / 2 + (span / (n - 1)) * i;
        // Front side (toward glass, -Z): faces +Z toward table
        const front = proto.clone();
        front.position.set(x, 0, cz - gap);
        front.rotation.y = 0;
        g.add(front);
        // Back side (toward back wall, +Z): faces -Z toward table
        const back = proto.clone();
        back.position.set(x, 0, cz + gap);
        back.rotation.y = Math.PI;
        g.add(back);
      }
      // Two head chairs
      for (const sx of [-1, 1]) {
        const c = proto.clone();
        c.position.set(sx * (CONFIG.tableLength / 2 + 0.34), 0, cz);
        c.rotation.y = sx * Math.PI / 2;
        g.add(c);
      }
      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Freestanding media wall — display + CIENA branding (a furniture feature,
    // not architecture, so removing the rear wall leaves nothing floating).
    // -----------------------------------------------------------------------
    function makeLogoTexture() {
      const cv = document.createElement('canvas');
      cv.width = 1024; cv.height = 256;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, cv.width, cv.height);
      ctx.fillStyle = CONFIG.cienaRed;
      ctx.font = '700 170px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('CIENA', cv.width / 2, cv.height / 2 + 6);
      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    function buildMediaWall() {
      const g = new THREE.Group(); g.name = 'MediaWall';
      // A freestanding feature panel standing on the floor at the room's back edge,
      // centred on the long axis. It faces the room (-Z).
      const panelW = 12 * FT, panelH = 7.6 * FT, panelT = 5 * IN;
      const cz = D - panelT / 2 - 2 * IN;                    // just inside the room
      const front = cz - panelT / 2;                         // room-facing face
      const panelMat = new THREE.MeshStandardMaterial({ color: 0x1b2026, roughness: 0.55, metalness: 0.25 });
      g.add(at(box(panelW, panelH, panelT, panelMat), 0, panelH / 2, cz));

      // Display: bezel + an emissive panel whose face is a live canvas texture so the
      // monitor can play the Ciena / Optical "stories" driven from the iPad.
      const scW = 8 * FT, scH = 4.6 * FT, scY = panelH * 0.46;
      g.add(at(box(scW + 4 * IN, scH + 4 * IN, 1 * IN, mat.frame), 0, scY, front - 0.6 * IN));
      const screenMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, roughness: 0.3, metalness: 0.0,
        map: story.texture, emissive: 0xffffff, emissiveMap: story.texture, emissiveIntensity: 0.85,
      });
      // A plane facing the room (-Z) — like the logo — so the texture isn't mirrored.
      const screen = new THREE.Mesh(new THREE.PlaneGeometry(scW, scH), screenMat);
      screen.position.set(0, scY, front - 1.0 * IN);
      screen.rotation.y = Math.PI;
      g.add(screen);

      // CIENA logo, centred above the display.
      const logoMat = new THREE.MeshBasicMaterial({ map: makeLogoTexture(), transparent: true });
      const logoW = 5.5 * FT;
      const logo = new THREE.Mesh(new THREE.PlaneGeometry(logoW, logoW / 4), logoMat);
      logo.position.set(0, scY + scH / 2 + 0.85 * FT, front - 0.8 * IN);
      logo.rotation.y = Math.PI;                             // face into the room (-Z)
      g.add(logo);

      // Brand-blue accent bar near the base of the panel.
      g.add(at(box(panelW, 4 * IN, 0.5 * IN, mat.brand), 0, 0.55 * FT, front - 0.5 * IN));
      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Ceiling lights (emissive panels + soft area light)
    // -----------------------------------------------------------------------
    function buildCeilingLights() {
      const g = new THREE.Group(); g.name = 'CeilingLights';
      const cols = CONFIG.lightCols, rows = CONFIG.lightRows;
      const panelW = 2 * FT, panelD = 2 * FT;
      const y = H - 1 * IN;
      const marginX = L * 0.12, marginZ = D * 0.18;
      for (let c = 0; c < cols; c++) {
        for (let r = 0; r < rows; r++) {
          const x = -L / 2 + marginX + (L - 2 * marginX) * (cols === 1 ? 0.5 : c / (cols - 1));
          const z = marginZ + (D - 2 * marginZ) * (rows === 1 ? 0.5 : r / (rows - 1));
          g.add(at(box(panelW, 1 * IN, panelD, mat.lens, { cast: false }), x, y, z));
          // A modest RectAreaLight beneath each panel (no shadows, soft fill).
          const ral = new THREE.RectAreaLight(0xfff4e0, 5.5, panelW, panelD);
          ral.position.set(x, y - 1.5 * IN, z);
          ral.rotation.x = -Math.PI / 2;                      // face down
          g.add(ral);
        }
      }
      // Hallway lights (a row of small ones)
      for (let c = 0; c < cols; c++) {
        const x = -L / 2 + marginX + (L - 2 * marginX) * (cols === 1 ? 0.5 : c / (cols - 1));
        g.add(at(box(panelW, 1 * IN, 1 * FT, mat.lens, { cast: false }), x, y, -W / 2));
      }
      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Scene lighting (key sun + fill)
    // -----------------------------------------------------------------------
    function buildLighting() {
      const hemi = new THREE.HemisphereLight(0xdfe9f5, 0x2a2f36, 0.9);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xfff3e0, 2.4);
      // Sun comes from beyond the far glass wall, raking through into the room.
      sun.position.set(L * 0.3, H * 2.2, -W - 8 * FT);
      sun.target.position.set(0, 0, D * 0.5);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 40;
      const s = Math.max(L, D) * 0.8;
      Object.assign(sun.shadow.camera, { left: -s, right: s, top: s, bottom: -s });
      sun.shadow.bias = -0.0004;
      scene.add(sun);
      scene.add(sun.target);

      // Gentle fill from the room side so interior faces aren't muddy.
      const fill = new THREE.DirectionalLight(0xbfd4ff, 0.4);
      fill.position.set(-L * 0.4, H, D * 1.5);
      scene.add(fill);
    }

    // -----------------------------------------------------------------------
    // Clock — drives glass tweens, the monitor stories and the iPad glow.
    // -----------------------------------------------------------------------
    const clock = new THREE.Clock();

    // -----------------------------------------------------------------------
    // Glass frosting — fade one wall between clear glass and opaque "frosted".
    // Each wall owns its own material clone (see buildGlassWall), so the two
    // walls toggle independently. Transitions run as small per-frame tweens.
    // -----------------------------------------------------------------------
    const glassTweens = [];
    function setGlassFrosted(glassMat, on) {
      const clear = glassMat.userData.clear;
      const to = on
        ? { transmission: 0.0, roughness: 0.9, opacity: 1.0, color: 0xdfe7ea }
        : { transmission: clear.transmission, roughness: clear.roughness,
            opacity: clear.opacity, color: clear.color };
      const from = {
        transmission: glassMat.transmission, roughness: glassMat.roughness,
        opacity: glassMat.opacity, color: glassMat.color.getHex(),
      };
      // Replace any in-flight tween for this material.
      for (let i = glassTweens.length - 1; i >= 0; i--) {
        if (glassTweens[i].mat === glassMat) glassTweens.splice(i, 1);
      }
      glassTweens.push({
        mat: glassMat, from, to, start: clock.getElapsedTime(), dur: 0.6,
        cFrom: new THREE.Color(from.color), cTo: new THREE.Color(to.color),
      });
    }
    function updateGlassTweens(now) {
      for (let i = glassTweens.length - 1; i >= 0; i--) {
        const tw = glassTweens[i];
        let k = (now - tw.start) / tw.dur;
        if (k >= 1) k = 1;
        const e = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;  // ease-in-out
        const m = tw.mat;
        m.transmission = tw.from.transmission + (tw.to.transmission - tw.from.transmission) * e;
        m.roughness    = tw.from.roughness    + (tw.to.roughness    - tw.from.roughness) * e;
        m.opacity      = tw.from.opacity      + (tw.to.opacity      - tw.from.opacity) * e;
        m.color.copy(tw.cFrom).lerp(tw.cTo, e);
        if (k >= 1) glassTweens.splice(i, 1);
      }
    }

    // -----------------------------------------------------------------------
    // Monitor "stories" — a live canvas texture on the media-wall screen that
    // plays one of two looping branded animations (or sits on idle branding).
    // -----------------------------------------------------------------------
    const story = (() => {
      const cv = document.createElement('canvas');
      cv.width = 1024; cv.height = 576;
      const ctx = cv.getContext('2d');
      const texture = new THREE.CanvasTexture(cv);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = 8;
      const W = cv.width, Hh = cv.height;

      let active = null;      // null | 'ciena' | 'optical'
      let startT = 0;
      let idleDrawn = false;

      function bg(a, b) {
        const grd = ctx.createLinearGradient(0, 0, 0, Hh);
        grd.addColorStop(0, a); grd.addColorStop(1, b);
        ctx.fillStyle = grd; ctx.fillRect(0, 0, W, Hh);
      }
      // A soft radial glow blob.
      function glow(x, y, r, color, alpha) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, color);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = alpha; ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      // ----- Idle: static Ciena branding -----
      function drawIdle() {
        bg('#0c1622', '#070b10');
        glow(W / 2, Hh * 0.42, 360, 'rgba(40,90,150,0.25)', 1);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#e4002b';
        ctx.font = '700 132px "Segoe UI", Arial, sans-serif';
        ctx.fillText('CIENA', W / 2, Hh * 0.44);
        ctx.fillStyle = '#9fb3c6';
        ctx.font = '400 30px "Segoe UI", Arial, sans-serif';
        ctx.fillText('EXECUTIVE BRIEFING CENTER', W / 2, Hh * 0.62);
      }

      // ----- Ciena story: an adaptive-network graph lighting up -----
      const nodes = [
        [0.16, 0.30], [0.30, 0.58], [0.27, 0.18], [0.46, 0.40], [0.62, 0.22],
        [0.70, 0.56], [0.85, 0.34], [0.52, 0.70], [0.40, 0.44], [0.78, 0.74],
      ];
      const links = [[0, 2], [0, 1], [1, 8], [8, 3], [2, 3], [3, 4], [4, 5],
                     [5, 6], [4, 6], [3, 7], [7, 5], [1, 7], [5, 9], [7, 9]];
      function drawCiena(t) {
        bg('#0a1420', '#04070c');
        const px = (f) => f * W, py = (f) => f * Hh;
        // Links
        ctx.lineWidth = 2;
        for (const [a, b] of links) {
          ctx.strokeStyle = 'rgba(90,150,220,0.22)';
          ctx.beginPath();
          ctx.moveTo(px(nodes[a][0]), py(nodes[a][1]));
          ctx.lineTo(px(nodes[b][0]), py(nodes[b][1]));
          ctx.stroke();
        }
        // Pulses travelling along links
        links.forEach(([a, b], i) => {
          const p = ((t * 0.35 + i * 0.13) % 1);
          const x = px(nodes[a][0] + (nodes[b][0] - nodes[a][0]) * p);
          const y = py(nodes[a][1] + (nodes[b][1] - nodes[a][1]) * p);
          glow(x, y, 26, 'rgba(120,190,255,0.9)', 0.9);
        });
        // Nodes, brightening in sequence
        nodes.forEach(([nx, ny], i) => {
          const b = 0.5 + 0.5 * Math.sin(t * 2 + i * 0.8);
          const x = px(nx), y = py(ny);
          const accent = (i % 4 === 0);
          glow(x, y, 34, accent ? 'rgba(228,0,43,0.85)' : 'rgba(80,150,230,0.8)', 0.4 + 0.5 * b);
          ctx.fillStyle = accent ? '#ff5577' : '#cfe6ff';
          ctx.beginPath(); ctx.arc(x, y, 7 + 3 * b, 0, Math.PI * 2); ctx.fill();
        });
        // Title with a left-to-right reveal wipe over the first ~1.4s
        const rev = Math.min(1, t / 1.4);
        ctx.save();
        ctx.beginPath(); ctx.rect(0, Hh * 0.70, W * rev, Hh * 0.30); ctx.clip();
        const grd = ctx.createLinearGradient(0, Hh * 0.8, 0, Hh);
        grd.addColorStop(0, 'rgba(6,10,16,0)'); grd.addColorStop(0.4, 'rgba(6,10,16,0.85)');
        ctx.fillStyle = grd; ctx.fillRect(0, Hh * 0.70, W, Hh * 0.30);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#e4002b';
        ctx.font = '700 70px "Segoe UI", Arial, sans-serif';
        ctx.fillText('CIENA', W / 2, Hh * 0.84);
        ctx.fillStyle = '#cfe0ee';
        ctx.font = '600 24px "Segoe UI", Arial, sans-serif';
        ctx.fillText('THE ADAPTIVE NETWORK', W / 2, Hh * 0.93);
        ctx.restore();
      }

      // ----- Optical story: light pulses down fibres + a wavelength spectrum -----
      const fibreYs = [0.16, 0.26, 0.36, 0.46];
      const hues = [180, 150, 280, 320];
      function drawOptical(t) {
        bg('#03101a', '#01060b');
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        // Fibres
        fibreYs.forEach((fy, i) => {
          const y = fy * Hh;
          ctx.strokeStyle = `hsla(${hues[i]},80%,60%,0.18)`;
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
          // 3 pulses per fibre, varying speed
          const speed = 0.18 + i * 0.05;
          for (let p = 0; p < 3; p++) {
            const x = (((t * speed + p / 3 + i * 0.11) % 1)) * (W + 120) - 60;
            glow(x, y, 30, `hsla(${hues[i]},90%,65%,0.95)`, 0.9);
          }
        });
        // Wavelength spectrum analyser along the bottom
        const bars = 56, baseY = Hh * 0.92, maxH = Hh * 0.26;
        const bw = W / bars;
        for (let i = 0; i < bars; i++) {
          const n = (Math.sin(t * 2.2 + i * 0.45) * 0.5 + 0.5) *
                    (Math.sin(t * 0.9 + i * 0.2) * 0.3 + 0.7);
          const h = 6 + n * maxH;
          const hue = 200 + (i / bars) * 160;  // spectrum sweep
          ctx.fillStyle = `hsla(${hue},85%,60%,0.9)`;
          ctx.fillRect(i * bw + 2, baseY - h, bw - 3, h);
        }
        // Title
        glow(W / 2, Hh * 0.62, 280, 'rgba(20,120,150,0.3)', 1);
        ctx.fillStyle = '#56e0ff';
        ctx.font = '700 76px "Segoe UI", Arial, sans-serif';
        ctx.fillText('OPTICAL', W / 2, Hh * 0.60);
        ctx.fillStyle = '#b8eeff';
        ctx.font = '600 26px "Segoe UI", Arial, sans-serif';
        ctx.fillText('WAVELOGIC · COHERENT OPTICS', W / 2, Hh * 0.70);
      }

      // Toggle: tapping the active story stops it (back to idle).
      function play(name, now) {
        active = (active === name) ? null : name;
        startT = now;
        idleDrawn = false;
        return active;
      }
      function update(now) {
        if (active === 'ciena')        { drawCiena(now - startT);   texture.needsUpdate = true; }
        else if (active === 'optical') { drawOptical(now - startT); texture.needsUpdate = true; }
        else if (!idleDrawn)           { drawIdle(); idleDrawn = true; texture.needsUpdate = true; }
      }
      drawIdle();  // paint something before the first frame
      return { texture, play, update, current: () => active };
    })();

    // -----------------------------------------------------------------------
    // iPad control terminal on the table — clicking it opens the menu overlay.
    // -----------------------------------------------------------------------
    function makeIpadTexture() {
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 384;
      const ctx = cv.getContext('2d');
      const grd = ctx.createLinearGradient(0, 0, 0, cv.height);
      grd.addColorStop(0, '#16263c'); grd.addColorStop(1, '#0a121d');
      ctx.fillStyle = grd; ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#e4002b';
      ctx.font = '700 54px "Segoe UI", Arial, sans-serif';
      ctx.fillText('CIENA', cv.width / 2, 120);
      // play glyph in a ring
      ctx.strokeStyle = 'rgba(120,180,240,0.6)'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(cv.width / 2, 210, 40, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#cfe6ff';
      ctx.beginPath();
      ctx.moveTo(cv.width / 2 - 12, 190); ctx.lineTo(cv.width / 2 - 12, 230);
      ctx.lineTo(cv.width / 2 + 22, 210); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#eaf1f8';
      ctx.font = '600 30px "Segoe UI", Arial, sans-serif';
      ctx.fillText('TAP TO CONTROL', cv.width / 2, 300);
      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8;
      return tex;
    }

    let ipadFaceMat = null;     // for the idle glow pulse in animate()
    function buildIpad() {
      const g = new THREE.Group(); g.name = 'iPad';
      const w = 1.05 * FT, h = 0.8 * FT, t = 0.3 * IN;     // a generous, easy-to-spot tablet
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0c0e12, roughness: 0.35, metalness: 0.6 });

      const tablet = new THREE.Group();
      tablet.add(box(w, h, t, bodyMat));
      const faceTex = makeIpadTexture();
      ipadFaceMat = new THREE.MeshStandardMaterial({
        map: faceTex, emissive: 0xffffff, emissiveMap: faceTex,
        emissiveIntensity: 0.7, roughness: 0.25, metalness: 0.0,
        polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
      });
      const face = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.92, h * 0.9), ipadFaceMat);
      face.position.z = t / 2 + 0.004;
      tablet.add(face);
      // Recline the tablet on its stand so the screen faces up toward the user.
      tablet.rotation.x = -0.72;
      tablet.position.y = h * 0.42;
      g.add(tablet);
      // Small stand puck under it.
      g.add(at(cyl(0.045, 0.06, 0.02, mat.tableBase), 0, 0.01, 0.02));

      // Place on the table top, near one end, turned slightly toward the camera.
      g.position.set(CONFIG.tableLength * 0.30, CONFIG.tableHeight + 0.01, D / 2 + 0.05);
      g.rotation.y = 0.5;
      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Build everything
    // -----------------------------------------------------------------------
    buildFloors();
    buildCeilings();
    const nearWall = buildGlassWall(0,  { door: true,  name: 'NearGlassWall' });
    const farWall  = buildGlassWall(-W, { door: false, name: 'FarGlassWall' });
    buildTable();
    placeChairs();
    buildMediaWall();
    buildCeilingLights();
    buildLighting();
    const ipadGroup = buildIpad();

    // -----------------------------------------------------------------------
    // iPad interaction — raycast clicks (distinguished from orbit drags) open
    // the menu overlay; the overlay's tiles drive the scene directly.
    // -----------------------------------------------------------------------
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    let ipadHover = false;
    let downX = 0, downY = 0, downT = 0;

    function ipadHit(clientX, clientY) {
      ndc.x = (clientX / window.innerWidth) * 2 - 1;
      ndc.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);
      return raycaster.intersectObject(ipadGroup, true).length > 0;
    }
    renderer.domElement.addEventListener('pointerdown', (e) => {
      downX = e.clientX; downY = e.clientY; downT = performance.now();
    });
    renderer.domElement.addEventListener('pointerup', (e) => {
      const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
      if (moved > 6 || performance.now() - downT > 600) return;   // it was a drag
      if (ipadHit(e.clientX, e.clientY)) openOverlay();
    });
    renderer.domElement.addEventListener('pointermove', (e) => {
      ipadHover = ipadHit(e.clientX, e.clientY);
      renderer.domElement.style.cursor = ipadHover ? 'pointer' : '';
    });

    // ----- Overlay wiring -----
    const overlay = document.getElementById('ipad-overlay');
    const cienaTile = overlay.querySelector('[data-action="ciena-story"]');
    const opticalTile = overlay.querySelector('[data-action="optical-story"]');
    const glassFrosted = { near: false, far: false };

    function openOverlay() {
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
    }
    function closeOverlay() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
    }
    function setTileState(tile, on, text) {
      tile.classList.toggle('active', on);
      tile.querySelector('.state').textContent = text;
    }
    function refreshStoryTiles() {
      const a = story.current();
      setTileState(cienaTile,   a === 'ciena',   a === 'ciena'   ? 'Playing' : 'Off');
      setTileState(opticalTile, a === 'optical', a === 'optical' ? 'Playing' : 'Off');
    }
    function handleAction(action, tile) {
      if (action === 'conf-glass') {
        glassFrosted.near = !glassFrosted.near;
        setGlassFrosted(nearWall.userData.glassMat, glassFrosted.near);
        setTileState(tile, glassFrosted.near, glassFrosted.near ? 'Frosted' : 'Clear');
      } else if (action === 'lab-glass') {
        glassFrosted.far = !glassFrosted.far;
        setGlassFrosted(farWall.userData.glassMat, glassFrosted.far);
        setTileState(tile, glassFrosted.far, glassFrosted.far ? 'Frosted' : 'Clear');
      } else if (action === 'ciena-story') {
        story.play('ciena', clock.getElapsedTime());
        refreshStoryTiles();
      } else if (action === 'optical-story') {
        story.play('optical', clock.getElapsedTime());
        refreshStoryTiles();
      }
    }
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { closeOverlay(); return; }     // backdrop
      const tile = e.target.closest('[data-action]');
      if (!tile) return;
      if (tile.dataset.action === 'close') { closeOverlay(); return; }
      handleAction(tile.dataset.action, tile);
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
    });

    // -----------------------------------------------------------------------
    // Resize + render loop
    // -----------------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let started = false;
    function animate() {
      requestAnimationFrame(animate);
      const now = clock.getElapsedTime();
      controls.update();
      updateGlassTweens(now);
      story.update(now);
      // Idle breathing glow on the iPad screen (a touch brighter on hover).
      if (ipadFaceMat) {
        ipadFaceMat.emissiveIntensity = (ipadHover ? 1.0 : 0.7) + Math.sin(now * 2) * 0.12;
      }
      renderer.render(scene, camera);
      if (!started) {
        started = true;
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hidden');
      }
    }
    animate();

    // Expose for debugging / tweaking from the console.
    window.EBC = { scene, camera, renderer, controls, CONFIG, mat, root, THREE,
                   nearWall, farWall, ipadGroup, story, setGlassFrosted, openOverlay };
  </script>
</body>
</html>
