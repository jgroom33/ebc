<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciena EBC — Conference Room</title>
  <link rel="icon" href="data:," />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0b0f14; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    /* Title / branding overlay */
    #hud {
      position: fixed; top: 22px; left: 26px; z-index: 10;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      color: #eaf1f8; pointer-events: none; user-select: none;
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    }
    #hud .logo { font-size: 30px; font-weight: 700; letter-spacing: 4px; color: #e4002b; }
    #hud .sub  { font-size: 13px; font-weight: 400; letter-spacing: 2px; opacity: 0.85; margin-top: 2px; }
    #hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 10;
      font-family: "Segoe UI", system-ui, sans-serif; font-size: 12px; letter-spacing: 1px;
      color: #cdd8e3; opacity: 0.7; pointer-events: none; user-select: none;
    }

    /* Loading screen */
    #loader {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center; flex-direction: column;
      background: #0b0f14; transition: opacity 0.6s ease; gap: 14px;
      font-family: "Segoe UI", system-ui, sans-serif; color: #6f86a0;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader .spin {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(47,143,230,0.25); border-top-color: #2f8fe6;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error panel */
    #error {
      position: fixed; inset: 0; z-index: 30; display: none;
      align-items: center; justify-content: center; padding: 40px;
      background: #0b0f14; font-family: ui-monospace, "Cascadia Code", monospace;
      color: #ff8e8e; font-size: 13px; white-space: pre-wrap; line-height: 1.6;
    }

    /* iPad control overlay — appears when the on-table tablet is tapped. */
    #ipad-overlay {
      position: fixed; inset: 0; z-index: 40; display: none;
      align-items: center; justify-content: center;
      background: rgba(6, 9, 13, 0.55); backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    }
    #ipad-overlay.open { display: flex; }
    /* The tablet "device" — a rounded slab with a thick bezel around the screen. */
    #ipad-overlay .device {
      width: min(86vw, 940px); max-height: 92vh;
      background: linear-gradient(160deg, #1c1f24, #0e1014);
      border-radius: 38px; padding: 20px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.04);
      transform: scale(0.86); opacity: 0;
      transition: transform 0.32s cubic-bezier(.2,.9,.3,1.2), opacity 0.28s ease;
    }
    #ipad-overlay.open .device { transform: scale(1); opacity: 1; }
    /* The glass screen inside the bezel. */
    #ipad-overlay .screen {
      background: radial-gradient(120% 140% at 50% 0%, #142031 0%, #0b1118 60%, #080c11 100%);
      border-radius: 22px; padding: 30px 34px 34px;
      box-shadow: inset 0 0 0 1px rgba(120,170,230,0.10), inset 0 18px 60px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    #ipad-overlay .screen::before {  /* faint screen sheen */
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(125deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 32%);
    }
    #ipad-overlay .head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    #ipad-overlay .titles .logo {
      font-size: 24px; font-weight: 700; letter-spacing: 4px; color: #e4002b;
    }
    #ipad-overlay .titles .sub {
      font-size: 12px; letter-spacing: 2px; color: #9fb3c6; margin-top: 2px;
    }
    #ipad-overlay .close {
      width: 38px; height: 38px; border-radius: 50%; flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04);
      color: #cdd8e3; font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    #ipad-overlay .close:hover { background: rgba(255,255,255,0.10); transform: scale(1.05); }
    /* 2×2 hero menu. */
    #ipad-overlay .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    #ipad-overlay .tile {
      position: relative; text-align: left; cursor: pointer;
      border-radius: 18px; padding: 22px 22px 20px;
      background: linear-gradient(160deg, rgba(38,52,72,0.55), rgba(20,28,40,0.55));
      border: 1px solid rgba(120,170,230,0.14); color: #eaf1f8;
      transition: transform 0.14s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      min-height: 124px; display: flex; flex-direction: column; justify-content: space-between;
    }
    #ipad-overlay .tile:hover {
      transform: translateY(-2px);
      border-color: rgba(120,170,230,0.4);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    #ipad-overlay .tile:active { transform: translateY(0); }
    #ipad-overlay .tile .icon { font-size: 26px; line-height: 1; }
    #ipad-overlay .tile .label { font-size: 18px; font-weight: 600; }
    #ipad-overlay .tile .desc { font-size: 12px; color: #9fb3c6; margin-top: 4px; }
    /* Active state pill (top-right of a tile). */
    #ipad-overlay .tile .state {
      position: absolute; top: 14px; right: 14px;
      font-size: 10px; letter-spacing: 1.5px; font-weight: 700;
      padding: 4px 9px; border-radius: 20px; text-transform: uppercase;
      color: #9fb3c6; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #ipad-overlay .tile.active {
      border-color: rgba(228,0,43,0.55);
      background: linear-gradient(160deg, rgba(96,30,42,0.55), rgba(40,18,24,0.6));
      box-shadow: 0 0 0 1px rgba(228,0,43,0.3), 0 12px 30px rgba(0,0,0,0.4);
    }
    #ipad-overlay .tile.active .state {
      color: #fff; background: #e4002b; border-color: #e4002b;
    }
    /* Demo Mode — a full-width hero tile across the top of the menu. */
    #ipad-overlay .tile.wide {
      grid-column: 1 / -1; flex-direction: row; align-items: center; gap: 18px;
      min-height: 84px;
      background: linear-gradient(120deg, rgba(20,40,66,0.7), rgba(14,22,34,0.7));
    }
    #ipad-overlay .tile.wide .icon { font-size: 30px; }
    #ipad-overlay .tile.wide.active {
      border-color: rgba(41,255,92,0.5);
      background: linear-gradient(120deg, rgba(16,60,40,0.6), rgba(10,30,24,0.7));
      box-shadow: 0 0 0 1px rgba(41,255,92,0.3), 0 12px 30px rgba(0,0,0,0.45);
    }
    #ipad-overlay .tile.wide.active .state {
      color: #06140d; background: #29ff5c; border-color: #29ff5c;
    }
  </style>

  <!-- three.js + addons from CDN (no build step) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="logo">CIENA</div>
    <div class="sub">EXECUTIVE BRIEFING CENTER</div>
  </div>
  <div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div>

  <div id="loader"><div class="spin"></div><div>Building conference room…</div></div>
  <div id="error"></div>

  <!-- iPad control surface — shown when the on-table tablet is clicked. -->
  <div id="ipad-overlay" aria-hidden="true">
    <div class="device" role="dialog" aria-label="Conference room control">
      <div class="screen">
        <div class="head">
          <div class="titles">
            <div class="logo">CIENA</div>
            <div class="sub">CONFERENCE ROOM CONTROL</div>
          </div>
          <button class="close" data-action="close" title="Close" aria-label="Close">×</button>
        </div>
        <div class="grid">
          <button class="tile wide" data-action="demo-mode">
            <span class="state">Off</span>
            <span class="icon">🎬</span>
            <span>
              <span class="label">Full Demo</span>
              <span class="desc">Dim, frost, run the presentation, then spotlight the 6500</span>
            </span>
          </button>
          <button class="tile" data-action="conf-glass">
            <span class="state">Clear</span>
            <span class="icon">🪟</span>
            <span>
              <span class="label">Conference Room Glass</span>
              <span class="desc">Frost the room's glass wall opaque</span>
            </span>
          </button>
          <button class="tile" data-action="lab-glass">
            <span class="state">Clear</span>
            <span class="icon">🧪</span>
            <span>
              <span class="label">Lab Glass</span>
              <span class="desc">Frost the lab glass &amp; show the presentation</span>
            </span>
          </button>
          <button class="tile" data-action="spotlight">
            <span class="state">Off</span>
            <span class="icon">🔦</span>
            <span>
              <span class="label">Spotlight</span>
              <span class="desc">Dim the room &amp; spotlight the 6500 section</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Surface any module-load/runtime error to the on-screen panel. -->
  <script>
    (function () {
      const errEl = document.getElementById('error');
      function showError(msg) {
        errEl.style.display = 'flex';
        errEl.textContent = 'Failed to load the scene:\n\n' + msg;
        const l = document.getElementById('loader');
        if (l) l.classList.add('hidden');
      }
      window.addEventListener('error', (e) => showError(e.message || String(e.error)));
      window.addEventListener('unhandledrejection', (e) => showError(String(e.reason)));
    })();
  </script>

  <!-- ======================================================================
       Ciena EBC — Glass-Walled Conference Room (inlined; single-file build)
       A parametric three.js scene. Every element is its own THREE.Group,
       driven by the CONFIG block below so the room can be re-proportioned in
       one place. three.js loads from a CDN via the import map above.
       ====================================================================== -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

    // -----------------------------------------------------------------------
    // Units & configuration  (internal units = metres; defaults given in feet)
    // -----------------------------------------------------------------------
    const FT = 0.3048;          // feet  -> metres
    const IN = FT / 12;         // inches -> metres

    const CONFIG = {
      // Architectural shell -------------------------------------------------
      roomLength:   39.5 * FT,  // X — the long (glass) wall's length
      roomDepth:    17.5 * FT,  // Z — the room's width (front-to-back depth)
      ceilingHeight:   9 * FT,  // Y
      hallWidth:       6 * FT,  // Z — hallway between the two glass walls
      wallThickness:   6 * IN,
      glassThickness:  1 * IN,
      frameDepth:      2 * IN,  // mullion / frame profile
      // Lab room (across the hallway, centred on the conference room) ---------
      labLength:      31 * FT,  // X — centred across from the conference room
      labWidth:       23 * FT,  // Z — depth, back from the shared glass wall
      // Enclosed room to the right (+X) of the conference room ----------------
      rightRoomWidth: 14.5 * FT,  // X — its depth (Z) matches the conference room
      // Door opening in the near glass wall --------------------------------
      doorWidth:       3.2 * FT,
      doorHeight:      7 * FT,
      // Furniture -----------------------------------------------------------
      tableLength:    24 * FT,
      tableWidth:      4 * FT,
      tableHeight:     0.74,     // ~29 in
      chairsPerSide:   9,
      // Ceiling lights ------------------------------------------------------
      lightCols:       8,        // along X
      lightRows:       2,        // along Z
      // Palette -------------------------------------------------------------
      cienaRed: '#e4002b',       // logo wordmark colour
      color: {
        brandBlue:  0x0056b4,
        wall:       0xe1ded7,
        floorRoom:  0x3c3f46,    // carpet
        floorHall:  0x9aa3ab,    // polished
        ceiling:    0xededed,
        frame:      0x2a2e33,    // dark anodised metal
        glassTint:  0xcfe3ea,
        tableTop:   0x2a1c12,    // dark wood
        tableBase:  0x1e1e21,
        chair:      0x2d3037,
        screen:     0x0f0f12,
        lens:       0xfff6e6,
      },
    };

    // Convenience derived dimensions
    const L = CONFIG.roomLength;
    const D = CONFIG.roomDepth;
    const H = CONFIG.ceilingHeight;
    const W = CONFIG.hallWidth;

    // -----------------------------------------------------------------------
    // Renderer / scene / camera
    // -----------------------------------------------------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('app').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x10151b);

    // Image-based lighting — required for transmissive glass to read believably.
    RectAreaLightUniformsLib.init();
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const camera = new THREE.PerspectiveCamera(
      52, window.innerWidth / window.innerHeight, 0.1, 200
    );
    camera.position.set(L * 0.40, 1.75, D * 0.92);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.target.set(-L * 0.04, 1.35, -W * 0.4); // look across the room & through the glass
    controls.minDistance = 1.5;
    controls.maxDistance = 70;
    controls.maxPolarAngle = Math.PI * 0.495;       // don't dip under the floor
    controls.update();

    // -----------------------------------------------------------------------
    // Materials
    // -----------------------------------------------------------------------
    const C = CONFIG.color;
    const mat = {
      wall:      new THREE.MeshStandardMaterial({ color: C.wall, roughness: 0.92, metalness: 0.0 }),
      wallInfill: new THREE.MeshStandardMaterial({ color: 0x2c3038, roughness: 0.85, metalness: 0.05 }),
      floorRoom: new THREE.MeshStandardMaterial({ color: C.floorRoom, roughness: 0.95, metalness: 0.0 }),
      floorHall: new THREE.MeshStandardMaterial({ color: C.floorHall, roughness: 0.25, metalness: 0.1 }),
      ceiling:   new THREE.MeshStandardMaterial({ color: C.ceiling, roughness: 0.96, metalness: 0.0 }),
      frame:     new THREE.MeshStandardMaterial({ color: C.frame, roughness: 0.4, metalness: 0.85 }),
      tableTop:  new THREE.MeshStandardMaterial({ color: C.tableTop, roughness: 0.45, metalness: 0.05 }),
      tableBase: new THREE.MeshStandardMaterial({ color: C.tableBase, roughness: 0.5, metalness: 0.7 }),
      chair:     new THREE.MeshStandardMaterial({ color: C.chair, roughness: 0.7, metalness: 0.2 }),
      screen:    new THREE.MeshStandardMaterial({ color: C.screen, roughness: 0.25, metalness: 0.3,
                                                  emissive: 0x0a1a2e, emissiveIntensity: 0.6 }),
      brand:     new THREE.MeshStandardMaterial({ color: C.brandBlue, roughness: 0.5, metalness: 0.1,
                                                  emissive: C.brandBlue, emissiveIntensity: 0.15 }),
      lens:      new THREE.MeshStandardMaterial({ color: C.lens, emissive: C.lens, emissiveIntensity: 1.4,
                                                  roughness: 0.6 }),
      // Lab room finishes (kept on their own materials so Demo Mode's room/hall
      // light switch doesn't touch the lab).
      labFloor:  new THREE.MeshStandardMaterial({ color: 0xc2c7cd, roughness: 0.3, metalness: 0.1 }),
      labLens:   new THREE.MeshStandardMaterial({ color: C.lens, emissive: C.lens, emissiveIntensity: 1.2,
                                                  roughness: 0.6 }),
      rack:      new THREE.MeshStandardMaterial({ color: 0x14171c, roughness: 0.5, metalness: 0.6 }),
      cableMgr:  new THREE.MeshStandardMaterial({ color: 0x0c0f14, roughness: 0.55, metalness: 0.45 }),
      // Transmissive architectural glass. A low `thickness` keeps it reading as a thin
      // pane: high thickness makes the panes lens the room into a flipped ("mirror")
      // image, which looked like the door had a duplicate of itself.
      glass: new THREE.MeshPhysicalMaterial({
        color: C.glassTint, metalness: 0, roughness: 0.04,
        transmission: 1.0, ior: 1.5, thickness: 0.05,
        transparent: true, opacity: 1.0,
        envMapIntensity: 0.9, clearcoat: 0.12, clearcoatRoughness: 0.1,
      }),
    };

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    // A box centred at the origin of its own local space; caller positions it.
    function box(w, h, d, material, { cast = true, receive = true } = {}) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
      m.castShadow = cast;
      m.receiveShadow = receive;
      return m;
    }

    // Place a mesh by the centre of its footprint.
    function at(mesh, x, y, z) { mesh.position.set(x, y, z); return mesh; }

    const root = new THREE.Group();
    root.name = 'CienaEBC';
    scene.add(root);

    // -----------------------------------------------------------------------
    // Architectural shell
    // -----------------------------------------------------------------------
    function buildFloors() {
      const g = new THREE.Group(); g.name = 'Floors';
      const t = 2 * IN;
      // Room floor: Z in [0, D]
      g.add(at(box(L + 0.4, t, D, mat.floorRoom, { cast: false }), 0, -t / 2, D / 2));
      // Hallway floor: Z in [-W, 0]
      g.add(at(box(L + 0.4, t, W, mat.floorHall, { cast: false }), 0, -t / 2, -W / 2));
      root.add(g);
      return g;
    }

    function buildCeilings() {
      const g = new THREE.Group(); g.name = 'Ceilings';
      const t = 4 * IN;
      g.add(at(box(L + 0.4, t, D, mat.ceiling, { cast: false }), 0, H + t / 2, D / 2));
      g.add(at(box(L + 0.4, t, W, mat.ceiling, { cast: false }), 0, H + t / 2, -W / 2));
      root.add(g);
      return g;
    }

    // (The opaque side & rear walls were intentionally removed so the room can be
    //  panned/orbited from any angle without an enclosing wall blocking the view.
    //  The display + branding now live on a freestanding media wall.)

    // A horizontal frame rail spanning the full wall length.
    function rail(y, z, height = CONFIG.frameDepth) {
      return at(box(L, height, CONFIG.frameDepth, mat.frame), 0, y, z);
    }
    // A vertical mullion.
    function mullion(x, z, h = H) {
      return at(box(CONFIG.frameDepth, h, CONFIG.frameDepth, mat.frame), x, h / 2, z);
    }

    // A glazed wall at plane Z=z. `doors` is a list of {cx, width, handleSide}
    // door openings; the glass is bayed in around them.
    function buildGlassWall(z, { doors = [], solid = [], name = 'GlassWall' } = {}) {
      const g = new THREE.Group(); g.name = name;
      const gt = CONFIG.glassThickness;

      // Each wall gets its OWN glass material clone so it can be frosted opaque
      // independently of the other. Remember the clear-glass values for toggling back.
      // A pre-set (but zero-intensity) emissive lets the frost state glow like backlit
      // privacy glass — without it, frosting the far wall is invisible from the room
      // (it's a matte panel in a dim hall, seen through the near glass).
      const glass = mat.glass.clone();
      glass.emissive = new THREE.Color(0xdfe9f0);
      glass.emissiveIntensity = 0;
      glass.userData.clear = {
        color: glass.color.getHex(),
        transmission: glass.transmission,
        roughness: glass.roughness,
        opacity: glass.opacity,
        emissiveIntensity: 0,
      };
      g.userData.glassMat = glass;

      // Top & bottom rails + the two end mullions.
      g.add(rail(CONFIG.frameDepth / 2, z));                 // sill
      g.add(rail(H - CONFIG.frameDepth / 2, z));             // head
      g.add(mullion(-L / 2 + CONFIG.frameDepth / 2, z));
      g.add(mullion( L / 2 - CONFIG.frameDepth / 2, z));

      const glassH = H - CONFIG.frameDepth;                  // between sill & head
      const glassY = CONFIG.frameDepth + glassH / 2;

      const fd = CONFIG.frameDepth;
      const dh = CONFIG.doorHeight;
      const leftEnd = -L / 2 + fd, rightEnd = L / 2 - fd;

      // Glaze a horizontal segment [xs, xe] into glass bays, with intermediate mullions
      // (none at the segment ends — those are framed by their neighbours).
      function glazeBays(xs, xe) {
        const w = xe - xs;
        if (w < 0.02) return;
        const bays = Math.max(1, Math.round(w / (8 * FT)));
        const bayW = w / bays;
        for (let i = 0; i < bays; i++) {
          g.add(at(box(bayW - fd, glassH, gt, glass, { cast: false }), xs + bayW * (i + 0.5), glassY, z));
          if (i > 0) g.add(mullion(xs + bayW * i, z));
        }
      }
      // Fill a span [xs, xe], rendering any portion inside a `solid` range as an opaque
      // infill panel (no glass) and the rest as glass bays.
      function fillSpan(xs, xe) {
        if (xe - xs < 0.02) return;
        let segs = [[xs, xe, 'glass']];
        for (const s of solid) {
          segs = segs.flatMap(([a, b, kind]) => {
            if (kind !== 'glass' || s.x1 <= a || s.x0 >= b) return [[a, b, kind]];
            const out = [];
            if (a < s.x0) out.push([a, s.x0, 'glass']);
            out.push([Math.max(a, s.x0), Math.min(b, s.x1), 'solid']);
            if (b > s.x1) out.push([s.x1, b, 'glass']);
            return out;
          });
        }
        for (const [a, b, kind] of segs) {
          if (b - a < 0.02) continue;
          if (kind === 'solid') {
            g.add(at(box(b - a, glassH, fd, mat.wallInfill, { cast: false }), (a + b) / 2, glassY, z));
          } else glazeBays(a, b);
        }
      }
      // A glazed door leaf + transom + pull handle, centred at cx.
      function addDoor(cx, dw, handleSide) {
        const transH = (H - fd) - dh;
        if (transH > 0.02) {
          g.add(at(box(dw, transH, gt, glass, { cast: false }), cx, dh + transH / 2 + fd / 2, z));
          g.add(at(box(dw, fd, fd, mat.frame), cx, dh + fd / 2, z));      // head rail
        }
        g.add(at(box(dw - 1.5 * IN, dh - 2 * IN, gt, glass, { cast: false }), cx, dh / 2 + fd / 2, z));
        g.add(at(box(1.2 * IN, 12 * IN, 1.2 * IN, mat.frame),
                 cx + handleSide * (dw / 2 - 4 * IN), 1.05, z + gt));     // pull handle
      }

      // Walk left→right, glazing each span between the wall ends and the doors and
      // framing every door edge with a mullion (except where it meets an end one).
      let cursor = leftEnd;
      for (const d of doors.slice().sort((a, b) => a.cx - b.cx)) {
        const dLeft = d.cx - d.width / 2, dRight = d.cx + d.width / 2;
        fillSpan(cursor, dLeft);
        if (Math.abs(dLeft - leftEnd) > 0.01) g.add(mullion(dLeft, z));
        if (Math.abs(dRight - rightEnd) > 0.01) g.add(mullion(dRight, z));
        addDoor(d.cx, d.width, d.handleSide);
        cursor = dRight;
      }
      fillSpan(cursor, rightEnd);

      root.add(g);
      return g;
    }

    // Furniture
    // -----------------------------------------------------------------------
    function buildTable() {
      const g = new THREE.Group(); g.name = 'Table';
      const cz = D / 2;
      const topT = 2 * IN;
      const topY = CONFIG.tableHeight - topT / 2;
      // Top slab (slightly rounded look via a thin bevel box stack)
      g.add(at(box(CONFIG.tableLength, topT, CONFIG.tableWidth, mat.tableTop), 0, topY, cz));
      g.add(at(box(CONFIG.tableLength - 1 * IN, 0.6 * IN, CONFIG.tableWidth - 1 * IN, mat.tableTop),
               0, topY - topT / 2 - 0.3 * IN, cz));
      // Two panel bases (modern conference-table style)
      const baseH = CONFIG.tableHeight - topT;
      const baseInset = CONFIG.tableLength * 0.28;
      for (const sx of [-baseInset, baseInset]) {
        g.add(at(box(2 * IN, baseH, CONFIG.tableWidth * 0.55, mat.tableBase), sx, baseH / 2, cz));
        g.add(at(box(10 * IN, 1 * IN, CONFIG.tableWidth * 0.62, mat.tableBase), sx, 0.5 * IN, cz)); // foot
      }
      // A subtle brand-blue cable channel down the centre of the top
      g.add(at(box(CONFIG.tableLength * 0.5, 0.4 * IN, 3 * IN, mat.brand), 0, topY + topT / 2, cz));
      root.add(g);
      return g;
    }

    // A solid cylinder helper (used for clean chair bases — no thin flickering plates).
    function cyl(rTop, rBottom, h, material) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBottom, h, 24), material);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }

    // One chair as a reusable group; cloned for each seat.
    function makeChair() {
      const g = new THREE.Group(); g.name = 'Chair';
      const seatH = 0.46, seatW = 0.5, seatD = 0.5;
      // Thick seat cushion + backrest (solid forms, not thin plates). The backrest is
      // pulled forward so its back face does NOT share the seat's back plane (z = -seatD/2),
      // which would otherwise z-fight and flicker as a "growing cube" when orbiting.
      g.add(at(box(seatW, 0.12, seatD, mat.chair), 0, seatH, 0));
      g.add(at(box(seatW, 0.52, 0.08, mat.chair), 0, seatH + 0.30, -seatD / 2 + 0.09));
      // Pedestal: gas column + disc base (cylinders — orbit-stable, no size flicker).
      // The column runs UP INTO the seat (top above seatH) so its cap never lies exactly
      // on the seat's underside plane — another coincident-face source of flicker.
      g.add(at(cyl(0.03, 0.03, seatH + 0.04, mat.tableBase), 0, (seatH + 0.04) / 2, 0));
      g.add(at(cyl(0.27, 0.30, 0.05, mat.tableBase), 0, 0.026, 0));
      return g;
    }

    function placeChairs() {
      const g = new THREE.Group(); g.name = 'Chairs';
      const proto = makeChair();
      const cz = D / 2;
      const n = CONFIG.chairsPerSide;
      const span = CONFIG.tableLength * 0.92;
      const gap = CONFIG.tableWidth / 2 + 0.32;             // distance from table centre to chair
      for (let i = 0; i < n; i++) {
        const x = -span / 2 + (span / (n - 1)) * i;
        // Front side (toward glass, -Z): faces +Z toward table
        const front = proto.clone();
        front.position.set(x, 0, cz - gap);
        front.rotation.y = 0;
        g.add(front);
        // Back side (toward back wall, +Z): faces -Z toward table
        const back = proto.clone();
        back.position.set(x, 0, cz + gap);
        back.rotation.y = Math.PI;
        g.add(back);
      }
      // Two head chairs
      for (const sx of [-1, 1]) {
        const c = proto.clone();
        c.position.set(sx * (CONFIG.tableLength / 2 + 0.34), 0, cz);
        c.rotation.y = sx * Math.PI / 2;
        g.add(c);
      }
      root.add(g);
      return g;
    }

    // A 19" equipment rack: 58U of mounting space (19" internal + ~1" frame each side
    // → ~21" external). Devices are placed by RU, RU 1 at the bottom, coloured by type.
    const RACK_W = 21 * IN;
    const RACK_U = 58;                      // rack height in rack units
    const U_M = 1.75 * IN;                  // one rack unit
    const RACK_PLINTH = 1.5 * IN;          // frame below RU 1
    const RACK_D = 2.4 * FT;
    const RACK_H = RACK_PLINTH + RACK_U * U_M + 1.5 * IN;
    const DEV_FRONT = RACK_D / 2 + 0.3 * IN;   // device-face offset from rack centre (+Z)
    const fiberMats = [];                      // fat-line materials (need resolution on resize)

    // All equipment renders a uniform whitish-gray faceplate (device-type colour is
    // ignored). Both states are solid/opaque so every device is visible; deployed is a
    // touch brighter, planned is dimmer and gets an amber outline (see makeRack).
    const DEV_GRAY = 0xccd2d9;
    const devMatCache = new Map();
    function devMaterial(hex, state) {
      let m = devMatCache.get(state);
      if (!m) {
        m = new THREE.MeshStandardMaterial({
          color: DEV_GRAY, emissive: DEV_GRAY,
          emissiveIntensity: state === 'deployed' ? 0.16 : 0.06,
          roughness: state === 'deployed' ? 0.5 : 0.62, metalness: 0.12,
        });
        m.userData.base = m.emissiveIntensity;   // restore point for Spotlight mode
        devMatCache.set(state, m);
      }
      return m;
    }
    const plannedEdgeMat = new THREE.LineBasicMaterial({ color: 0xf6a623 });  // amber = planned

    // A transparent-background canvas-text label plane (rack IDs, zones, fiber tags).
    function makeLabelPlane(text, wM, hM, { color = '#eaf1f8', bg = null, size = 64, bold = true } = {}) {
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = Math.max(64, Math.round(512 * hM / wM));
      const ctx = cv.getContext('2d');
      if (bg) { ctx.fillStyle = bg; ctx.fillRect(0, 0, cv.width, cv.height); }
      ctx.fillStyle = color;
      ctx.font = `${bold ? '700 ' : ''}${size}px "Segoe UI", Arial, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, cv.width / 2, cv.height / 2 + 2);
      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8;
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
      return new THREE.Mesh(new THREE.PlaneGeometry(wM, hM), mat);
    }

    // A large, readable signage panel (solid plate + big bold text) for rack-zone
    // headers. The whole canvas is filled (OPAQUE) so the sign renders into the glass
    // transmission pass and is visible through the glass from the conference room —
    // transparent overlays are skipped by that pass and would be invisible.
    function makeBigLabel(text, wM, hM) {
      const cv = document.createElement('canvas');
      cv.width = 1024; cv.height = Math.max(128, Math.round(1024 * hM / wM));
      const ctx = cv.getContext('2d'), W = cv.width, Hc = cv.height;
      ctx.fillStyle = '#1b2838'; ctx.fillRect(0, 0, W, Hc);        // solid dark-slate plate
      ctx.fillStyle = '#e4002b'; ctx.fillRect(0, Hc - Hc * 0.09, W, Hc * 0.09);  // Ciena-red base bar
      ctx.fillStyle = '#ffffff';
      const font = (s) => `700 ${s}px "Segoe UI", Arial, sans-serif`;
      let fs = Math.round(Hc * 0.62);                              // shrink to fit narrow signs
      ctx.font = font(fs);
      while (ctx.measureText(text).width > W * 0.9 && fs > 12) { fs -= 4; ctx.font = font(fs); }
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, W / 2, Hc / 2 - Hc * 0.02);
      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8;
      return new THREE.Mesh(new THREE.PlaneGeometry(wM, hM),
        new THREE.MeshBasicMaterial({ map: tex }));                // opaque (no transparent flag)
    }

    function makeSlideTexture(draw) {

    const SLIDE_RED = '#e4002b';
    function slideRR(ctx, x, y, w, h, r) {       // rounded-rect path
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);

      ctx.arcTo(x, y, x + w, y, r);

        ctx.fillStyle = SLIDE_RED; ctx.font = '800 46px "Segoe UI", Arial, sans-serif';

        ctx.fillText('W E L C O M E', W / 2, H * 0.32);
        ctx.fillStyle = '#ffffff'; ctx.font = '800 130px "Segoe UI", Arial, sans-serif';

        const nodes = [
          { x: cx - rx, y: cy - ry, label: 'Site A' },

          { x: cx - rx, y: cy + ry, label: 'Site D' },
        ];

        for (const [a, b] of [[0, 1], [1, 2], [2, 3], [3, 0], [0, 2], [1, 3]]) {
          ctx.beginPath(); ctx.moveTo(nodes[a].x, nodes[a].y); ctx.lineTo(nodes[b].x, nodes[b].y); ctx.stroke();

        for (const n of nodes) {

          ctx.fillStyle = '#ffffff'; ctx.font = '700 34px "Segoe UI", Arial, sans-serif';

        }
        ctx.fillStyle = '#9fb3c8'; ctx.font = '600 26px "Segoe UI", Arial, sans-serif';

      },
      // 3 — Demo time
      (ctx, W, H) => {

        ctx.fillStyle = SLIDE_RED;
        const tx = W / 2, ty = H * 0.33, s = 58;
        ctx.beginPath();
        ctx.moveTo(tx - s * 0.5, ty - s); ctx.lineTo(tx - s * 0.5, ty + s); ctx.lineTo(tx + s, ty);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.font = '800 148px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // One rack: dark cabinet + a coloured panel per device at its RU position.
    function makeRack(devices) {
      const g = new THREE.Group(); g.name = 'Rack';
      g.add(at(box(RACK_W, RACK_H, RACK_D, mat.rack), 0, RACK_H / 2, 0));
      const devW = 19 * IN;
      for (const dv of devices) {
        const hh = dv.h * U_M - 0.18 * IN;
        const y = RACK_PLINTH + (dv.ru - 1 + dv.h / 2) * U_M;
        const panel = at(box(devW, hh, 1.4 * IN, devMaterial(dv.color, dv.state), { cast: false }), 0, y, DEV_FRONT);
        g.add(panel);
        if (dv.state !== 'deployed') {            // amber outline marks planned gear
          const edges = new THREE.LineSegments(new THREE.EdgesGeometry(panel.geometry), plannedEdgeMat);
          edges.position.copy(panel.position);
          g.add(edges);
        }
      }
      return g;
    }
    function buildLab() {
      const g = new THREE.Group(); g.name = 'Lab';
      const labL = CONFIG.labLength, labW = CONFIG.labWidth;
      const xHalf = labL / 2;
      const zFront = -W;                       // shared glass wall plane
      const zBack  = -W - labW;                // back wall
      const cz = (zFront + zBack) / 2;         // lab centre (z)
      const wt = CONFIG.wallThickness;
      const ft = 2 * IN, ct = 4 * IN;
      const labH = H + 2 * FT;                  // lab ceiling sits 2 ft above the room/hall

      // Shell: floor, ceiling, opaque back + side walls (front stays open to glass).
      g.add(at(box(labL, ft, labW, mat.labFloor, { cast: false }), 0, -ft / 2, cz));
      g.add(at(box(labL + 2 * wt, ct, labW, mat.ceiling, { cast: false }), 0, labH + ct / 2, cz));
      g.add(at(box(labL + 2 * wt, labH, wt, mat.wall), 0, labH / 2, zBack - wt / 2));
      g.add(at(box(wt, labH, labW, mat.wall), -xHalf - wt / 2, labH / 2, cz));
      g.add(at(box(wt, labH, labW, mat.wall),  xHalf + wt / 2, labH / 2, cz));
      // Front bulkhead above the 9 ft glass wall, closing the taller lab to its ceiling.
      g.add(at(box(labL + 2 * wt, labH - H, wt, mat.wall), 0, (H + labH) / 2, zFront + wt / 2));

      // Presentation projected across the lab's GLASS wall, facing the conference room.
      // It shows only when that glass is FROSTED opaque (the "Lab Glass" control) — the
      // frosted pane becomes the projection screen, read from across the hall. Slides cycle
      // in animate(); opaque/unlit so it carries through the near-glass transmission pass.
      presoSlides = SLIDE_DRAWERS.map(d => makeSlideTexture(d));
      const scrH = 6.6 * FT, scrW = scrH * 16 / 9;                       // big 16:9, centred
      const glassMidY = CONFIG.frameDepth + (H - CONFIG.frameDepth) / 2;
      const scrZ = zFront + CONFIG.glassThickness / 2 + 0.6 * IN;        // just in front of the pane
      presoMat = new THREE.MeshBasicMaterial({ map: presoSlides[0] });
      presoScreen = new THREE.Mesh(new THREE.PlaneGeometry(scrW, scrH), presoMat);
      presoScreen.position.set(0, glassMidY, scrZ);
      presoScreen.visible = false;                                       // revealed when glass frosts
      g.add(presoScreen);

      // Ceiling light panels (+ a few area lights NOT registered with Demo Mode,
      // so the lab stays lit and back-lights the frosted glass during the demo).
      const lp = 2 * FT, ly = labH - 1 * IN, cols = 4, rows = 2;
      const mX = labL * 0.16, mZ = labW * 0.20;
      for (let c = 0; c < cols; c++) for (let r = 0; r < rows; r++) {
        const x = -xHalf + mX + (labL - 2 * mX) * (c / (cols - 1));
        const z = (zBack + mZ) + (labW - 2 * mZ) * (r / (rows - 1));
        g.add(at(box(lp, 1 * IN, lp, mat.labLens, { cast: false }), x, ly, z));
      }
      for (const x of [-xHalf * 0.5, xHalf * 0.5]) {
        const ral = new THREE.RectAreaLight(0xeaf2ff, 4.0, labL * 0.5, labW * 0.5);
        ral.position.set(x, ly - 1.5 * IN, cz);
        ral.rotation.x = -Math.PI / 2;
        ral.userData.base = 4.0; labAreaLights.push(ral);
        g.add(ral);
      }

      // Front display row A1–A10 (5 ft off the glass) + back row B2–B8 (a 3 ft aisle
      // behind it). Both face the glass (+Z); racks are 6" apart, A10 is 5 ft from the
      // right wall, and X is keyed by display order so B columns align under A columns.
      const pitch = RACK_W + 6 * IN;                   // centre-to-centre
      const xRight = xHalf - 5 * FT - RACK_W / 2;      // display-order 10 (A10) centre
      const frontRackZ = zFront - 5 * FT - RACK_D / 2;
      const backRackZ  = frontRackZ - (RACK_D + 3 * FT);
      const devPos = new Map();                        // deviceName -> front-centre world pos
      const orderOf = (id) => parseInt(id.slice(1), 10);
      const xOfOrder = (o) => xRight - pitch * (10 - o);

      const rowsInfo = {};                             // row -> { z, orders[] }
      for (const [id, rk_] of Object.entries(LAB_RACKS.racks)) {
        const x = xOfOrder(rk_.order), z = rk_.row === 'back' ? backRackZ : frontRackZ;
        const rk = makeRack(rk_.devices);
        rk.position.set(x, 0, z);
        g.add(rk);
        const lbl = makeLabelPlane(id, 0.26, 0.10, { size: 80 });   // rack ID on top
        lbl.position.set(x, RACK_H + 0.07, z + RACK_D / 2 - 0.01);
        g.add(lbl);
        for (const dv of rk_.devices) {
          const y = RACK_PLINTH + (dv.ru - 1 + dv.h / 2) * U_M;
          devPos.set(dv.name, new THREE.Vector3(x, y, z + DEV_FRONT));
        }
        (rowsInfo[rk_.row] ||= { z, orders: [] }).orders.push(rk_.order);
      }

      // Vertical cable managers fill each 6" inter-rack gap and extend 6" in front of
      // the rack faces (the gap is the cable-routing channel).
      const mgrW = 6 * IN - 0.2 * IN, mgrD = RACK_D + 6 * IN;
      for (const row of Object.values(rowsInfo)) {
        const orders = row.orders.sort((a, b) => a - b);
        for (let i = 0; i < orders.length - 1; i++) {
          if (orders[i + 1] - orders[i] !== 1) continue;             // only between adjacent racks
          const cx = (xOfOrder(orders[i]) + xOfOrder(orders[i + 1])) / 2;
          const cz = row.z + 3 * IN;                                 // back flush w/ rack, front +6"
          g.add(at(box(mgrW, RACK_H, mgrD, mat.cableMgr), cx, RACK_H / 2, cz));
        }
      }

      // Section signage: one large opaque sign per zone, sitting above its equipment
      // in the clear RU gap (so it never overlaps gear), at the cable-trough plane.
      const signZ = frontRackZ + RACK_D / 2 + 6 * IN;
      const occupiedFor = (rackStart, rackEnd) => {
        const occ = new Array(60).fill(false);
        for (let o = orderOf(rackStart); o <= orderOf(rackEnd); o++)
          for (const d of (LAB_RACKS.racks['A' + o]?.devices || []))
            for (let ru = d.ru; ru < d.ru + d.h; ru++) if (ru >= 1 && ru <= 59) occ[ru] = true;
        return occ;
      };
      const gapBand = (occ, anchor) => {                 // clear gap around the anchor RU
        let bottom = anchor; while (bottom <= 58 && occ[bottom]) bottom++;
        while (bottom - 1 >= 1 && !occ[bottom - 1]) bottom--;
        let top = bottom; while (top + 1 <= 58 && !occ[top + 1]) top++;
        return { bottom, hRU: Math.min(9, top - bottom + 1 - 0.5) };
      };
      // The 6500/ELS/RLS lower-section signs share ONE aligned band — the clear gap
      // common to their racks, capped by the tightest section (RLS, under the 8192s).
      const ALIGNED = new Set(['6500', 'ELS', 'RLS', 'TDM']);
      const lowerZones = LAB_RACKS.zones.filter(z => ALIGNED.has(z.label));
      let alignedBand = null;
      if (lowerZones.length) {
        const occ = new Array(60).fill(false);
        for (const z of lowerZones) { const o2 = occupiedFor(z.rackStart, z.rackEnd); for (let i = 0; i < 60; i++) if (o2[i]) occ[i] = true; }
        alignedBand = gapBand(occ, lowerZones[0].ru);
      }
      for (const z of LAB_RACKS.zones) {
        if (z.label === 'Outdoor Units') continue;     // not signed (redundant with Outdoor)
        const { bottom, hRU } = (ALIGNED.has(z.label) && alignedBand)
          ? alignedBand
          : (() => { let b = z.ru, occ = occupiedFor(z.rackStart, z.rackEnd);
              while (b <= 58 && occ[b]) b++; let t = b; while (t + 1 <= 58 && !occ[t + 1]) t++;
              return { bottom: b, hRU: Math.min(9, t - b + 1 - 0.5) }; })();
        if (hRU < 2) continue;
        const hM = hRU * U_M;
        const xs = xOfOrder(orderOf(z.rackStart)), xe = xOfOrder(orderOf(z.rackEnd));
        const left = Math.min(xs, xe) - RACK_W / 2, right = Math.max(xs, xe) + RACK_W / 2;
        const sign = makeBigLabel(z.label, right - left, hM);
        sign.position.set((left + right) / 2, RACK_PLINTH + (bottom - 1) * U_M + hM / 2, signZ);
        g.add(sign);
      }

      // Section accent downlight — an LED bar tucked behind a sign's lower edge, washing
      // the equipment below. Always on; in Spotlight mode (room dark) it makes the section
      // glow. Built per-label so more sections can be added with another call.
      function addSectionDownlight(label) {
        const z = LAB_RACKS.zones.find(zo => zo.label === label);
        if (!z) return;
        const { bottom } = (ALIGNED.has(label) && alignedBand)
          ? alignedBand
          : (() => { let b = z.ru, occ = occupiedFor(z.rackStart, z.rackEnd);
              while (b <= 58 && occ[b]) b++; return { bottom: b }; })();
        const xs = xOfOrder(orderOf(z.rackStart)), xe = xOfOrder(orderOf(z.rackEnd));
        const left = Math.min(xs, xe) - RACK_W / 2, right = Math.max(xs, xe) + RACK_W / 2;
        const cx = (left + right) / 2, sillY = RACK_PLINTH + (bottom - 1) * U_M;
        const led = new THREE.RectAreaLight(0xeaf2ff, 14.0, (right - left) - 4 * IN, 5 * IN);
        led.position.set(cx, sillY + 1 * IN, signZ - 4 * IN);   // behind the sign's lower edge
        led.rotation.x = -Math.PI / 2 + 0.4;                    // face down, raked at the rack faces
        led.userData.section = label; led.userData.base = led.intensity;
        sectionDownlights.push(led);
        g.add(led);
      }
      addSectionDownlight('6500');

      // Fiber spans: a glowing patch-cable between two named devices, bowed toward the glass.
      for (const f of LAB_RACKS.fibers) {
        const a = devPos.get(f.a), b = devPos.get(f.b);
        if (!a || !b) continue;
        const front = 2.5 * IN;                        // float off the rack faces
        const mid = a.clone().add(b).multiplyScalar(0.5); mid.z += 2.5 * IN;
        const pts = [
          a.x, a.y, a.z + front,  mid.x, mid.y, mid.z,  b.x, b.y, b.z + front,
        ];
        const geo = new LineGeometry(); geo.setPositions(pts);
        const lm = new LineMaterial({ color: new THREE.Color(f.color).getHex(), linewidth: 3,
          dashed: !!f.dashed, dashSize: 0.06, gapSize: 0.04, transparent: true, opacity: 0.95 });
        lm.resolution.set(window.innerWidth, window.innerHeight);
        const line = new Line2(geo, lm); line.computeLineDistances();
        line.renderOrder = 3;
        g.add(line);
        fiberMats.push(lm);
        if (f.label) {
          const fl = makeLabelPlane(f.label, 0.34, 0.10, { color: '#cdeafe', size: 52 });
          fl.position.set(mid.x, mid.y + 0.12, mid.z + 0.5 * IN);
          g.add(fl);
        }
      }

      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Enclosed room to the right (+X) of the conference room: solid walls, its own
    // floor / ceiling / lighting, separated from the conference room by a solid wall.
    // -----------------------------------------------------------------------
    function buildRightRoom() {
      const g = new THREE.Group(); g.name = 'RightRoom';
      const rw = CONFIG.rightRoomWidth;        // X width
      const xL = L / 2, xR = L / 2 + rw, cx = L / 2 + rw / 2, cz = D / 2;
      const wt = CONFIG.wallThickness, ft = 2 * IN, ct = 4 * IN;

      // Floor + ceiling, sized to the interior (between the walls) so they don't
      // overlap/​z-fight with the conference room's floor & ceiling at the shared edge.
      g.add(at(box(rw - wt, ft, D - wt, mat.floorRoom, { cast: false }), cx, -ft / 2, cz));
      g.add(at(box(rw - wt, ct, D - wt, mat.ceiling, { cast: false }), cx, H + ct / 2, cz));
      // Solid walls: divider (shared with the conf room), right, front, back.
      // The divider carries a door near the back-right corner that connects the
      // conference room to this room: wall | … | door+transom | … (toward back).
      const dw = CONFIG.doorWidth, dh = CONFIG.doorHeight;
      const doorZ1 = D - 1.2 * FT, doorZ0 = doorZ1 - dw, doorZc = (doorZ0 + doorZ1) / 2;
      g.add(at(box(wt, H, doorZ0, mat.wall), xL, H / 2, doorZ0 / 2));            // front segment
      g.add(at(box(wt, H, D - doorZ1, mat.wall), xL, H / 2, (doorZ1 + D) / 2));  // back segment
      g.add(at(box(wt, H - dh, dw, mat.wall), xL, (dh + H) / 2, doorZc));        // transom above door
      g.add(at(box(1.5 * IN, dh - 2 * IN, dw - 2 * IN, mat.frame), xL, dh / 2, doorZc));   // leaf
      g.add(at(box(1.2 * IN, 12 * IN, 1.2 * IN, mat.frame),                      // pull handle (room side)
               xL - wt / 2 - 0.6 * IN, 1.05, doorZc + dw / 2 - 4 * IN));
      g.add(at(box(wt, H, D, mat.wall), xR, H / 2, cz));
      g.add(at(box(rw + wt, H, wt, mat.wall), cx, H / 2, 0));
      g.add(at(box(rw + wt, H, wt, mat.wall), cx, H / 2, D));
      // Ceiling lights (own material + area light, independent of Demo Mode).
      const lp = 2 * FT, ly = H - 1 * IN;
      for (const lx of [cx - rw * 0.22, cx + rw * 0.22]) for (const lz of [D * 0.3, D * 0.7]) {
        g.add(at(box(lp, 1 * IN, lp, mat.labLens, { cast: false }), lx, ly, lz));
      }
      const ral = new THREE.RectAreaLight(0xfff4e0, 4.0, rw * 0.8, D * 0.8);
      ral.position.set(cx, ly - 1.5 * IN, cz); ral.rotation.x = -Math.PI / 2;
      ral.userData.base = 4.0; labAreaLights.push(ral);
      g.add(ral);

      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Ceiling lights (emissive panels + soft area light)
    // -----------------------------------------------------------------------
    const ceilingRectLights = [];     // collected so Demo Mode can switch them off
    const labAreaLights = [];         // lab + right-room area lights (off in Spotlight mode)
    const sectionDownlights = [];     // section accent LEDs (boosted in Spotlight mode)
    function buildCeilingLights() {
      const g = new THREE.Group(); g.name = 'CeilingLights';
      const cols = CONFIG.lightCols, rows = CONFIG.lightRows;
      const panelW = 2 * FT, panelD = 2 * FT;
      const y = H - 1 * IN;
      const marginX = L * 0.12, marginZ = D * 0.18;
      for (let c = 0; c < cols; c++) {
        for (let r = 0; r < rows; r++) {
          const x = -L / 2 + marginX + (L - 2 * marginX) * (cols === 1 ? 0.5 : c / (cols - 1));
          const z = marginZ + (D - 2 * marginZ) * (rows === 1 ? 0.5 : r / (rows - 1));
          g.add(at(box(panelW, 1 * IN, panelD, mat.lens, { cast: false }), x, y, z));
          // A modest RectAreaLight beneath each panel (no shadows, soft fill).
          const ral = new THREE.RectAreaLight(0xfff4e0, 5.5, panelW, panelD);
          ral.position.set(x, y - 1.5 * IN, z);
          ral.rotation.x = -Math.PI / 2;                      // face down
          ral.userData.base = ral.intensity;
          ceilingRectLights.push(ral);
          g.add(ral);
        }
      }
      // Hallway lights (a row of small ones)
      for (let c = 0; c < cols; c++) {
        const x = -L / 2 + marginX + (L - 2 * marginX) * (cols === 1 ? 0.5 : c / (cols - 1));
        g.add(at(box(panelW, 1 * IN, 1 * FT, mat.lens, { cast: false }), x, y, -W / 2));
      }
      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Scene lighting (key sun + fill)
    // -----------------------------------------------------------------------
    function buildLighting() {
      const hemi = new THREE.HemisphereLight(0xdfe9f5, 0x2a2f36, 0.9);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xfff3e0, 2.4);
      // Sun comes from beyond the far glass wall, raking through into the room.
      sun.position.set(L * 0.3, H * 2.2, -W - 8 * FT);
      sun.target.position.set(0, 0, D * 0.5);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 40;
      const s = Math.max(L, D) * 0.8;
      Object.assign(sun.shadow.camera, { left: -s, right: s, top: s, bottom: -s });
      sun.shadow.bias = -0.0004;
      scene.add(sun);
      scene.add(sun.target);

      // Gentle fill from the room side so interior faces aren't muddy.
      const fill = new THREE.DirectionalLight(0xbfd4ff, 0.4);
      fill.position.set(-L * 0.4, H, D * 1.5);
      scene.add(fill);

      return { hemi, sun, fill };
    }

    // -----------------------------------------------------------------------
    // Clock — drives glass tweens, the monitor stories and the iPad glow.
    // -----------------------------------------------------------------------
    const clock = new THREE.Clock();

    // -----------------------------------------------------------------------
    // Glass frosting — fade one wall between clear glass and opaque "frosted".
    // Each wall owns its own material clone (see buildGlassWall), so the two
    // walls toggle independently. Transitions run as small per-frame tweens.
    // -----------------------------------------------------------------------
    const glassTweens = [];
    function setGlassFrosted(glassMat, on, frostGlow = 0.6) {
      const clear = glassMat.userData.clear;
      const to = on
        ? { transmission: 0.0, roughness: 0.9, opacity: 1.0, color: 0xe7eef3, emissiveIntensity: frostGlow }
        : { transmission: clear.transmission, roughness: clear.roughness,
            opacity: clear.opacity, color: clear.color, emissiveIntensity: clear.emissiveIntensity };
      const from = {
        transmission: glassMat.transmission, roughness: glassMat.roughness,
        opacity: glassMat.opacity, color: glassMat.color.getHex(),
        emissiveIntensity: glassMat.emissiveIntensity,
      };
      // Frosted = fully opaque. three.js's transmission pass only captures OPAQUE
      // objects, so a `transparent` wall is invisible behind the near glass. Flipping
      // `transparent` off when frosted lets the lab wall show through the near wall
      // from inside the conference room (clear glass stays transparent as normal).
      glassMat.transparent = !on;
      glassMat.needsUpdate = true;
      // Replace any in-flight tween for this material.
      for (let i = glassTweens.length - 1; i >= 0; i--) {
        if (glassTweens[i].mat === glassMat) glassTweens.splice(i, 1);
      }
      glassTweens.push({
        mat: glassMat, from, to, start: clock.getElapsedTime(), dur: 0.6,
        cFrom: new THREE.Color(from.color), cTo: new THREE.Color(to.color),
      });
    }
    function updateGlassTweens(now) {
      for (let i = glassTweens.length - 1; i >= 0; i--) {
        const tw = glassTweens[i];
        let k = (now - tw.start) / tw.dur;
        if (k >= 1) k = 1;
        const e = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;  // ease-in-out
        const m = tw.mat;
        m.transmission = tw.from.transmission + (tw.to.transmission - tw.from.transmission) * e;
        m.roughness    = tw.from.roughness    + (tw.to.roughness    - tw.from.roughness) * e;
        m.opacity      = tw.from.opacity      + (tw.to.opacity      - tw.from.opacity) * e;
        m.emissiveIntensity = tw.from.emissiveIntensity + (tw.to.emissiveIntensity - tw.from.emissiveIntensity) * e;
        m.color.copy(tw.cFrom).lerp(tw.cTo, e);
        if (k >= 1) glassTweens.splice(i, 1);
      }
    }


    // -----------------------------------------------------------------------
    // iPad control terminal on the table — clicking it opens the menu overlay.
    // -----------------------------------------------------------------------
    function makeIpadTexture() {
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 384;
      const ctx = cv.getContext('2d');
      const grd = ctx.createLinearGradient(0, 0, 0, cv.height);
      grd.addColorStop(0, '#16263c'); grd.addColorStop(1, '#0a121d');
      ctx.fillStyle = grd; ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#e4002b';
      ctx.font = '700 54px "Segoe UI", Arial, sans-serif';
      ctx.fillText('CIENA', cv.width / 2, 120);
      // play glyph in a ring
      ctx.strokeStyle = 'rgba(120,180,240,0.6)'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(cv.width / 2, 210, 40, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#cfe6ff';
      ctx.beginPath();
      ctx.moveTo(cv.width / 2 - 12, 190); ctx.lineTo(cv.width / 2 - 12, 230);
      ctx.lineTo(cv.width / 2 + 22, 210); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#eaf1f8';
      ctx.font = '600 30px "Segoe UI", Arial, sans-serif';
      ctx.fillText('TAP TO CONTROL', cv.width / 2, 300);
      const tex = new THREE.CanvasTexture(cv);
      tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8;
      return tex;
    }

    let ipadFaceMat = null;     // for the idle glow pulse in animate()
    let presoMat = null, presoScreen = null, presoSlides = [], presoIndex = -1, presoAuto = true;   // lab-glass slideshow
    function buildIpad() {
      const g = new THREE.Group(); g.name = 'iPad';
      const w = 1.05 * FT, h = 0.8 * FT, t = 0.3 * IN;     // a generous, easy-to-spot tablet
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0c0e12, roughness: 0.35, metalness: 0.6 });

      const tablet = new THREE.Group();
      tablet.add(box(w, h, t, bodyMat));
      const faceTex = makeIpadTexture();
      ipadFaceMat = new THREE.MeshStandardMaterial({
        map: faceTex, emissive: 0xffffff, emissiveMap: faceTex,
        emissiveIntensity: 0.7, roughness: 0.25, metalness: 0.0,
        polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
      });
      const face = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.92, h * 0.9), ipadFaceMat);
      face.position.z = t / 2 + 0.004;
      tablet.add(face);
      // Recline the tablet on its stand so the screen faces up toward the user.
      tablet.rotation.x = -0.72;
      tablet.position.y = h * 0.42;
      g.add(tablet);
      // Small stand puck under it.
      g.add(at(cyl(0.045, 0.06, 0.02, mat.tableBase), 0, 0.01, 0.02));

      // Place on the table top, near one end, turned slightly toward the camera.
      g.position.set(CONFIG.tableLength * 0.30, CONFIG.tableHeight + 0.01, D / 2 + 0.05);
      g.rotation.y = 0.5;
      root.add(g);
      return g;
    }

    // -----------------------------------------------------------------------
    // Build everything
    // -----------------------------------------------------------------------
    buildFloors();
    buildCeilings();
    const labDoorCx = CONFIG.labLength / 2 - (3 * FT) / 2;   // lab door centre, across the hall
    const nearWall = buildGlassWall(0, {
      name: 'NearGlassWall',
      // Doors symmetric about the centre: the right one aligns with the lab door across the
      // hall, the left one mirrors it, so each is the SAME distance from its corner.
      doors: [
        { cx: -labDoorCx, width: CONFIG.doorWidth, handleSide:  1 },
        { cx:  labDoorCx, width: CONFIG.doorWidth, handleSide: -1 },
      ],
      // Equal opaque infill panels from each corner to its door (no glass).
      solid: [
        { x0: -L / 2, x1: -labDoorCx - CONFIG.doorWidth / 2 },
        { x0:  labDoorCx + CONFIG.doorWidth / 2, x1: L / 2 },
      ],
    });
    // Lab glass wall: a single 3 ft door on the right side of the lab frontage
    // (its right edge meets the lab's right-hand wall at x = +labLength/2).
    const farWall = buildGlassWall(-W, {
      name: 'FarGlassWall',
      doors: [ { cx: labDoorCx, width: 3 * FT, handleSide: -1 } ],
    });
    buildTable();
    placeChairs();
    buildLab();
    buildRightRoom();
    buildCeilingLights();
    const sceneLights = buildLighting();
    const ipadGroup = buildIpad();

    // Remember the lit-room intensities so Demo Mode can dim and restore them.
    const lightBase = {
      lens: mat.lens.emissiveIntensity,
      labLens: mat.labLens.emissiveIntensity,
      hemi: sceneLights.hemi.intensity,
      sun:  sceneLights.sun.intensity,
      fill: sceneLights.fill.intensity,
      exposure: renderer.toneMappingExposure,
    };
    // Turn the conference-room + hallway fixtures on/off (Full Demo dims the lights to a
    // soft wash for the presentation, then Spotlight drops the room to near-black).
    function setRoomLightsOn(on) {
      mat.lens.emissiveIntensity = on ? lightBase.lens : 0.0;
      ceilingRectLights.forEach(r => { r.intensity = on ? r.userData.base : 0.0; });
      sceneLights.hemi.intensity = on ? lightBase.hemi : 0.10;
      sceneLights.sun.intensity  = on ? lightBase.sun  : 0.20;
      sceneLights.fill.intensity = on ? lightBase.fill : 0.08;
    }

    // -----------------------------------------------------------------------

    // -----------------------------------------------------------------------
    // iPad interaction — raycast clicks (distinguished from orbit drags) open
    // the menu overlay; the overlay's tiles drive the scene directly.
    // -----------------------------------------------------------------------
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    let ipadHover = false;
    let downX = 0, downY = 0, downT = 0;

    function ipadHit(clientX, clientY) {
      ndc.x = (clientX / window.innerWidth) * 2 - 1;
      ndc.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);
      return raycaster.intersectObject(ipadGroup, true).length > 0;
    }
    renderer.domElement.addEventListener('pointerdown', (e) => {
      downX = e.clientX; downY = e.clientY; downT = performance.now();
    });
    renderer.domElement.addEventListener('pointerup', (e) => {
      const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
      if (moved > 6 || performance.now() - downT > 600) return;   // it was a drag
      if (ipadHit(e.clientX, e.clientY)) openOverlay();
    });
    renderer.domElement.addEventListener('pointermove', (e) => {
      ipadHover = ipadHit(e.clientX, e.clientY);
      renderer.domElement.style.cursor = ipadHover ? 'pointer' : '';
    });

    // ----- Overlay wiring -----
    const overlay = document.getElementById('ipad-overlay');
    const labTile = overlay.querySelector('[data-action="lab-glass"]');
    const demoTile = overlay.querySelector('[data-action="demo-mode"]');
    const spotTile = overlay.querySelector('[data-action="spotlight"]');
    const glassFrosted = { near: false, far: false };
    let demoOn = false;
    let spotlightOn = false;
    let demoStart = 0, demoStep = 0;       // Full Demo choreography clock + step pointer

    function openOverlay() {
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
    }
    function closeOverlay() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
    }
    function setTileState(tile, on, text) {
      tile.classList.toggle('active', on);
      tile.querySelector('.state').textContent = text;
    }
    // Frost / clear the lab glass (mirrors the "Lab Glass" action) — the frosted pane
    // doubles as the presentation screen.
    function frostFar(on) {
      glassFrosted.far = on;
      setGlassFrosted(farWall.userData.glassMat, on);        // default frost glow → solid white
      setTileState(labTile, on, on ? 'Frosted' : 'Clear');
    }
    // Full Demo: a timed choreography — dim → frost glass → run the presentation → unfrost →
    // light up the 6500 → hold a beat → auto-restore. Stages fire from a clock-based driver in
    // animate() (the scene's established pattern); tapping the tile again aborts and restores.
    const SLIDE_DUR = 5, PRESO_T0 = 0.7;                     // let the 0.6 s frost settle first
    const PRESO_END = PRESO_T0 + 3 * SLIDE_DUR;              // 15.7 s — presentation done
    const SPOT_T = PRESO_END + 0.7;                          // 16.4 s — light up the 6500
    const RESTORE_T = SPOT_T + 10;                           // 26.4 s — hold the lit 6500 ~10 s, then restore
    const demoSteps = [
      { t: 0.0,       fn: () => { setRoomLightsOn(false); frostFar(true);
                                  presoAuto = false; presoScreen.visible = false; } },
      { t: PRESO_END, fn: () => { presoScreen.visible = false; frostFar(false); } },
      { t: SPOT_T,    fn: () => { setSpotlightMode(true); } },   // safe: no demoOn cross-cancel
      { t: RESTORE_T, fn: () => { setDemoMode(false); } },       // finish + restore
    ];
    function setDemoMode(on) {
      if (on) {
        if (spotlightOn) setSpotlightMode(false);            // start from a clean state
        demoOn = true; demoStart = clock.getElapsedTime(); demoStep = 0;
        presoAuto = false;                                   // the sequencer drives the slides
        if (presoScreen) presoScreen.visible = false;
        setTileState(demoTile, true, 'Running');
      } else {                                               // abort or natural finish → restore
        demoOn = false; presoAuto = true;
        if (presoScreen) presoScreen.visible = false;
        if (spotlightOn) setSpotlightMode(false);            // restore lights/exposure/dev-mats
        frostFar(false);                                     // ensure the lab glass is clear
        setRoomLightsOn(true);
        setTileState(demoTile, false, 'Off');
      }
    }
    // Spotlight mode: drop the room to near-dark (conf + hall + lab + right room) while the
    // always-on section downlights keep their equipment lit — the lab glass stays CLEAR so
    // the glowing 6500 reads from the conference room.
    function setSpotlightMode(on) {
      spotlightOn = on;
      // (Mutual exclusion with Full Demo lives in handleAction, so the demo's own terminal
      //  setSpotlightMode(true) at the finale doesn't cancel the in-progress sequence.)
      setRoomLightsOn(!on);                                  // conference + hallway fixtures
      labAreaLights.forEach(r => { r.intensity = on ? 0.0 : r.userData.base; });
      mat.labLens.emissiveIntensity = on ? 0.0 : lightBase.labLens;
      // Recede the equipment self-glow AND its image-based lighting so unlit sections go
      // dark; only the downlit 6500 stays bright (direct LED light ignores envMapIntensity).
      devMatCache.forEach(m => {
        m.emissiveIntensity = on ? m.userData.base * 0.15 : m.userData.base;
        m.envMapIntensity   = on ? 0.0 : 1.0;
      });
      // Darken the whole image (walls/glass/signs are IBL-lit) and boost the accent LEDs
      // so the lit section still pops against the near-black scene.
      renderer.toneMappingExposure = on ? 0.5 : lightBase.exposure;
      sectionDownlights.forEach(l => { l.intensity = on ? l.userData.base * 2.2 : l.userData.base; });
      if (on) {                                              // kill the residual ambient
        sceneLights.hemi.intensity = 0.0;
        sceneLights.sun.intensity  = 0.0;
        sceneLights.fill.intensity = 0.0;
        if (glassFrosted.far) {                              // ensure the lab glass is clear
          glassFrosted.far = false;
          setGlassFrosted(farWall.userData.glassMat, false);
          setTileState(labTile, false, 'Clear');
        }
      }
      setTileState(spotTile, on, on ? 'On' : 'Off');
    }
    function handleAction(action, tile) {
      if (action === 'conf-glass') {
        glassFrosted.near = !glassFrosted.near;
        setGlassFrosted(nearWall.userData.glassMat, glassFrosted.near);
        setTileState(tile, glassFrosted.near, glassFrosted.near ? 'Frosted' : 'Clear');
      } else if (action === 'lab-glass') {
        glassFrosted.far = !glassFrosted.far;
        setGlassFrosted(farWall.userData.glassMat, glassFrosted.far);
        setTileState(tile, glassFrosted.far, glassFrosted.far ? 'Frosted' : 'Clear');
      } else if (action === 'demo-mode') {
        setDemoMode(!demoOn);                                 // setDemoMode(true) cancels spotlight
      } else if (action === 'spotlight') {
        if (demoOn) setDemoMode(false);                       // cancel a running Full Demo first
        setSpotlightMode(!spotlightOn);
      }
    }
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { closeOverlay(); return; }     // backdrop
      const tile = e.target.closest('[data-action]');
      if (!tile) return;
      if (tile.dataset.action === 'close') { closeOverlay(); return; }
      handleAction(tile.dataset.action, tile);
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
    });

    // -----------------------------------------------------------------------
    // Resize + render loop
    // -----------------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      for (const m of fiberMats) m.resolution.set(window.innerWidth, window.innerHeight);
    });

    let started = false;
    function animate() {
      requestAnimationFrame(animate);
      const now = clock.getElapsedTime();
      controls.update();
      updateGlassTweens(now);
      // Idle breathing glow on the iPad screen (a touch brighter on hover).
      if (ipadFaceMat) {
        ipadFaceMat.emissiveIntensity = (ipadHover ? 1.0 : 0.7) + Math.sin(now * 2) * 0.12;
      }
      // The lab-glass presentation shows when that glass is frosted opaque (outside Full Demo,
      // which drives the slides itself via presoAuto=false). Advance slides (~6 s each).
      if (presoScreen && presoAuto) presoScreen.visible = glassFrosted.far && !demoOn;
      if (presoAuto && presoScreen && presoScreen.visible && presoSlides.length) {
        const i = Math.floor(now / 6) % presoSlides.length;
        if (i !== presoIndex) { presoIndex = i; presoMat.map = presoSlides[i]; presoMat.needsUpdate = true; }
      }
      // Full Demo choreography: fire each timed stage once, and drive the presentation slides
      // (0→1→2) off demo-relative time so the show always starts on the Welcome slide.
      if (demoOn) {
        const e = now - demoStart;
        while (demoStep < demoSteps.length && e >= demoSteps[demoStep].t) demoSteps[demoStep++].fn();
        if (e >= PRESO_T0 && e < PRESO_END && presoScreen) {
          presoScreen.visible = true;
          const i = Math.min(2, Math.floor((e - PRESO_T0) / SLIDE_DUR));
          if (i !== presoIndex) { presoIndex = i; presoMat.map = presoSlides[i]; presoMat.needsUpdate = true; }
        }
      }
      renderer.render(scene, camera);
      if (!started) {
        started = true;
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hidden');
      }
    }
    animate();

    // Expose for debugging / tweaking from the console.
    window.EBC = { scene, camera, renderer, controls, CONFIG, mat, root, THREE,
                   nearWall, farWall, ipadGroup, setGlassFrosted, openOverlay,
                   setRoomLightsOn, setDemoMode, setSpotlightMode,
                   presoSet: (i) => { presoAuto = false; presoIndex = i; presoScreen.visible = true;
                     presoMat.map = presoSlides[i]; presoMat.needsUpdate = true; } };
  </script>
</body>
</html>
